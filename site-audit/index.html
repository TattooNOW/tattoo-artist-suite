      const needsAtt = listings.filter(l => l.status==='needs_fix'||l.status==='needs_claim').length;
      const notListed = listings.filter(l => l.status==='not_listed').length;
      const tierNames = {1:'Critical',2:'High Impact',3:'Industry',4:'Secondary',5:'Regional'};

      // NAP consistency stats
      const withNap = listings.filter(l => l.status === 'listed' || l.status === 'needs_fix' || l.status === 'needs_claim');
      const napClean = withNap.filter(l => !l.nap_issues || l.nap_issues.length === 0).length;
      const napIssues = withNap.filter(l => l.nap_issues && l.nap_issues.length > 0).length;
      const napPct = withNap.length > 0 ? Math.round((napClean / withNap.length) * 100) : 0;
      const napIssueLabels = {'name_variation':'Name Mismatch','wrong_address':'Wrong Address','wrong_phone':'Wrong Phone','wrong_city':'Wrong City','old_address':'Old Address','wrong_category':'Wrong Category','dead_link_risk':'Dead Link Risk'};

      return (
        <div>
          <section style={{display:'flex', gap:'0.75rem', marginBottom:'1rem', flexWrap:'wrap', alignItems:'center'}}>
            <div className="score-card" style={{borderTop:'2px solid #4ade80'}}><h3>Listed <SourceInfo text={"Directory audit + HTTP verification\nChecks 25+ platforms for business presence, NAP consistency"} /></h3><div className="value" style={{color:'#4ade80'}}>{listed}</div></div>
            <div className="score-card" style={{borderTop:'2px solid #fbbf24'}}><h3>Needs Fix</h3><div className="value" style={{color:'#fbbf24'}}>{needsAtt}</div></div>
            <div className="score-card" style={{borderTop:'2px solid #f87171'}}><h3>Not Listed</h3><div className="value" style={{color:'#f87171'}}>{notListed}</div></div>
            <div className="score-card" style={{borderTop:'2px solid #60a5fa'}}><h3>NAP</h3><div className="value" style={{color: napPct >= 80 ? '#4ade80' : napPct >= 50 ? '#fbbf24' : '#f87171'}}>{napPct}%</div></div>
            {locationId && <FetchNewButton locationId={locationId} section="directories" label="Verify Listings" onRefresh={onRefresh} hidden={auditRunning} />}
          </section>
          {napIssues > 0 && (
            <div className="card" style={{marginBottom:'1.5rem', padding:'1rem', border:'1px solid rgba(251,191,36,0.3)', background:'rgba(251,191,36,0.05)'}}>
              <h4 style={{margin:'0 0 0.5rem', color:'#fbbf24'}}>NAP Issues Found</h4>
              <div style={{display:'flex', flexWrap:'wrap', gap:'0.5rem'}}>
                {listings.filter(l => l.nap_issues && l.nap_issues.length > 0).map(l => (
                  <div key={l.id} style={{background:'rgba(0,0,0,0.3)', borderRadius:'6px', padding:'0.4rem 0.75rem', fontSize:'0.85rem'}}>
                    <span style={{fontWeight:600}}>{l.platform.replace(/_/g,' ')}</span>
                    <span style={{color:'#fbbf24', marginLeft:'0.4rem'}}>{l.nap_issues.map(i => napIssueLabels[i] || i).join(', ')}</span>
                    {l.nap_priority && <span style={{marginLeft:'0.4rem', fontSize:'0.7rem', padding:'1px 5px', borderRadius:'3px', background: l.nap_priority === 'P0' ? '#ef4444' : l.nap_priority === 'P1' ? '#f59e0b' : '#6b7280', color:'#fff'}}>{l.nap_priority}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'1rem'}}>
            <select className="filter" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All Statuses</option>
              <option value="listed">Listed</option>
              <option value="needs_fix">Needs Fix</option>
              <option value="needs_claim">Needs Claim</option>
              <option value="not_listed">Not Listed</option>
            </select>
            <select className="filter" value={filterTier} onChange={e=>setFilterTier(e.target.value)}>
              <option value="all">All Tiers</option>
              {[1,2,3,4,5].map(t => <option key={t} value={t}>Tier {t}: {tierNames[t]}</option>)}
            </select>
          </div>
          <table>
            <thead><tr><th>Status</th><th>Platform</th><th>Tier</th><th>NAP</th><th>Claimed</th><th>Cost</th><th>Link</th></tr></thead>
            <tbody>
              {filtered.sort((a,b)=>a.tier-b.tier||a.platform.localeCompare(b.platform)).map(l => {
                const claimUrl = getSubmitUrl(l);
                const hasNapIssues = l.nap_issues && l.nap_issues.length > 0;
                const napStatus = (l.status === 'not_listed') ? null : hasNapIssues ? false : true;
                return (
                  <tr key={l.id} style={{background:statusRowBg(l.status)}}>
                    <td>{statusIcon(l.status)} {statusLabel(l.status)}</td>
                    <td style={{fontWeight:500}}>{l.platform.replace(/_/g,' ')}</td>
                    <td style={{color:'#888'}}>{tierNames[l.tier]||l.tier}</td>
                    <td style={{textAlign:'center'}}>{napStatus == null ? <span style={{color:'#555'}}>{'\u2014'}</span> : napStatus ? <span style={{color:'#4ade80'}} title="NAP matches">{'\u2713'}</span> : <span style={{color:'#fbbf24'}} title={l.nap_issues.map(i=>napIssueLabels[i]||i).join(', ')}>{'\u26A0'}</span>}</td>
                    <td>{l.is_claimed==null?'\u2014':l.is_claimed?'\u2713':'\u2717'}</td>
                    <td>{l.cost_tier||'FREE'}</td>
                    <td>
                      {l.listing_url && <a href={l.listing_url} target="_blank" rel="noopener" style={{color:'#4ade80', marginRight: claimUrl ? '0.5rem' : 0}}>View</a>}
                      {claimUrl && (l.status !== 'listed') && <a href={claimUrl} target="_blank" rel="noopener" style={{color:'#EA9320'}}>{l.status === 'needs_claim' ? 'Claim' : l.status === 'not_listed' ? 'Register' : 'Update'}</a>}
                      {claimUrl && l.status === 'listed' && !l.listing_url && <a href={claimUrl} target="_blank" rel="noopener" style={{color:'#60a5fa'}}>Manage</a>}
                      {!l.listing_url && !claimUrl && '\u2014'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          {/* ── Link Building Opportunities ── */}
          {links && links.length > 0 && (() => {
            // Deduplicate: remove link_checklist items that overlap with directory_listings
            const dirPlatforms = new Set((listings || []).map(l => l.platform.toLowerCase().replace(/[\s_-]+/g, '')));
            const deduped = links.filter(l => {
              if (l.link_type !== 'directory') return true;
              const titleKey = (l.title || '').toLowerCase().replace(/[\s_-]+/g, '');
              return !dirPlatforms.has(titleKey);
            });
            if (deduped.length === 0) return null;

            const typeColors = { authority: '#a78bfa', directory: '#60a5fa', sponsorship: '#4ade80', content: '#fbbf24', outreach: '#f97316' };
            const typeIcons = { authority: '\uD83C\uDFDB', directory: '\uD83D\uDCD6', sponsorship: '\uD83E\uDD1D', content: '\u270D\uFE0F', outreach: '\uD83D\uDCE7' };
            const done = deduped.filter(l => l.status === 'done').length;

            return (
              <div style={{marginTop:'2.5rem', paddingTop:'1.5rem', borderTop:'1px solid #333'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
                  <h3 style={{margin:0}}>Link Building Opportunities</h3>
                  <span style={{color:'#888', fontSize:'0.85rem'}}>{done}/{deduped.length} complete</span>
                </div>
                <table>
                  <thead><tr><th>Priority</th><th>Type</th><th>Title</th><th>Target</th><th>Cost</th><th>Status</th></tr></thead>
                  <tbody>
                    {deduped.sort((a,b)=>(a.priority||99)-(b.priority||99)).map(l => {
                      const color = typeColors[l.link_type] || '#888';
                      return (
                        <tr key={l.id} style={{background: l.status==='done'?'rgba(74,222,128,0.06)':'rgba(248,113,113,0.08)'}}>
                          <td><span className="pill" style={{background:l.priority<=2?'rgba(239,68,68,0.2)':l.priority<=5?'rgba(251,191,36,0.2)':'rgba(96,165,250,0.2)', color:l.priority<=2?'#f87171':l.priority<=5?'#fbbf24':'#60a5fa'}}>P{l.priority}</span></td>
                          <td><span style={{color, fontSize:'0.85rem'}}>{typeIcons[l.link_type] || '\uD83D\uDD17'} {(l.link_type||'').replace(/_/g,' ')}</span></td>
                          <td style={{fontWeight:500}}>{l.title}</td>
                          <td style={{fontSize:'0.8rem'}}>{(l.target_url || l.target_page) ? <a href={l.target_url || l.target_page} target="_blank" rel="noopener noreferrer" style={{color:'#EA9320', textDecoration:'none'}}>{(l.target_url || l.target_page).replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '')}</a> : '\u2014'}</td>
                          <td>{l.estimated_cost || 'Free'}</td>
                          <td style={{textTransform:'capitalize'}}>{l.status || 'pending'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })()}
        </div>
      );
    }

    /* ── Settings Panel ──────────────────────────────────── */
    function AdminPanel({ site, open, onClose, billingRecords, usageLogs, locationId, lastAuditDate, onAuditStarted, audits, findings, geoSignals, aiMentions, rankMaps }) {
      const [adminTab, setAdminTab] = React.useState('runs');
      const [saving, setSaving] = React.useState(false);
      const [saved, setSaved] = React.useState(false);
      const [auditStatus, setAuditStatus] = React.useState('idle');

      // Auto-detect if an audit is currently running
      React.useEffect(() => {
        if (!locationId) return;
        (async () => {
          try {
            const { data } = await db.from('audit_progress').select('step,pct')
              .eq('location_id', locationId).order('created_at', { ascending: false }).limit(1);
            if (data && data.length > 0 && data[0].step !== 'complete' && data[0].step !== 'error') {
              setAuditStatus('running');
            }
          } catch (e) { /* ignore */ }
        })();
      }, [locationId]);

      const social = site.social_links || {};
      const [form, setForm] = React.useState({
        domain: site.domain || '',
        phone: site.phone || '',
        address: site.address || '',
        city: site.target_city || site.city || '',
        state: site.target_state || site.state || '',
        ig: social.instagram || '',
        fb: social.facebook || '',
        tt: social.tiktok || '',
        google_url: social.google_url || '',
        yelp_url: social.yelp_url || '',
        clarity_token: social.clarity_token || '',
      });

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const save = async () => {
        setSaving(true);
        try {
          await db.from('sites').update({
            domain: form.domain,
            phone: form.phone,
            address: form.address,
            target_city: form.city,
            target_state: form.state,
            social_links: {
              instagram: form.ig, facebook: form.fb, tiktok: form.tt,
              google_url: form.google_url, yelp_url: form.yelp_url,
              clarity_token: form.clarity_token || null,
            },
          }).eq('id', site.id);
          setSaved(true);
          setTimeout(() => setSaved(false), 2000);
        } catch (e) { console.error(e); }
        setSaving(false);
      };

      const runAudit = () => {
        if (!form.domain) return;
        setAuditStatus('running');
        fetch(AUDIT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ locationId, domain: form.domain, address: form.address + ', ' + form.city + ', ' + form.state, phone: form.phone })
        }).then(res => console.log('Webhook response:', res.status))
          .catch(e => console.error('Audit trigger failed:', e));
        if (onAuditStarted) onAuditStarted();
      };

      if (!open) return null;

      const inputStyle = { background:'#111', color:'#fafafa', border:'1px solid #333', padding:'0.4rem 0.6rem', borderRadius:'4px', width:'100%', fontFamily:'Roboto, sans-serif', fontSize:'0.85rem', boxSizing:'border-box' };
      const labelStyle = { color:'#888', fontSize:'0.75rem', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'0.25rem', display:'block' };
      const adminTabBtn = (id, label) => (
        <button key={id} onClick={() => setAdminTab(id)} style={{
          padding:'0.5rem 1rem', background: adminTab === id ? '#EA9320' : 'transparent',
          color: adminTab === id ? '#000' : '#888', border:'1px solid ' + (adminTab === id ? '#EA9320' : '#333'),
          borderRadius:'4px', cursor:'pointer', fontWeight: adminTab === id ? 700 : 400,
          fontSize:'0.8rem', fontFamily:'Roboto, sans-serif',
        }}>{label}</button>
      );

      // Build detailed API data sources per audit
      const buildRunSources = (audit) => {
        const sections = [];
        const scores = audit.scores || {};
        const auditFindings = findings.filter(f => f.audit_id === audit.id);
        const auditGeo = geoSignals.filter(g => g.audit_id === audit.id);

        // 1. Homepage Crawl (HTTP GET)
        sections.push({
          section: 'Homepage',
          api: 'HTTP Crawl',
          provider: 'Direct',
          detail: audit.homepage_sections ? `${audit.homepage_sections.found||0}/${audit.homepage_sections.total||0} sections detected` : 'HTML parsed for SEO signals',
          result: scores.seo ? `SEO: ${scores.seo.score}/100` : null,
        });

        // 2. Lighthouse / Speed (Apify)
        if (scores.seo) {
          sections.push({
            section: 'Performance',
            api: 'Apify: Website Speed Checker',
            provider: 'Apify',
            actorId: 'onescales/website-speed-checker',
            detail: `Performance, LCP, CLS, TBT`,
            result: `SEO ${scores.seo.score}`,
            link: 'https://console.apify.com/actors/onescales~website-speed-checker',
          });
        }

        // 3. Core 30 Analysis (derived from crawl)
        if (audit.core30_coverage) {
          const c = audit.core30_coverage;
          sections.push({
            section: 'Core 30',
            api: 'Internal Link Analysis',
            provider: 'n8n',
            detail: `${(c.categories_found||0)+(c.services_found||0)} pages found, ${(c.categories_missing||0)+(c.services_missing||0)} missing`,
            result: `${audit.content_briefs?.length || 0} briefs generated`,
          });
        }

        // 4. GEO Signals (derived from crawl)
        if (auditGeo.length > 0) {
          const pass = auditGeo.filter(g => g.signal_value).length;
          sections.push({
            section: 'GEO Signals',
            api: 'NAP + Schema Detection',
            provider: 'n8n',
            detail: `9 signals checked: schema, NAP, city refs, OG tags, GBP embed`,
            result: `${pass}/${auditGeo.length} passing (${scores.geo_readiness?.score || 0}%)`,
          });
        }

        // 5. AI Probes (Perplexity + ChatGPT)
        if (aiMentions.length > 0) {
          const mentioned = aiMentions.filter(m => m.mentioned).length;
          const engines = [...new Set(aiMentions.map(m => m.engine))];
          sections.push({
            section: 'AI Mentions',
            api: engines.map(e => e === 'chatgpt' ? 'OpenAI ChatGPT' : 'Perplexity').join(' + '),
            provider: 'OpenAI / Perplexity',
            detail: `${aiMentions.length} probes across ${engines.length} engine${engines.length > 1 ? 's' : ''}`,
            result: `${mentioned}/${aiMentions.length} mentioned (${scores.ai_discoverability?.score || 0}%)`,
          });
        }

        // 6. Findings (rule engine)
        if (auditFindings.length > 0) {
          const open = auditFindings.filter(f => f.status === 'open').length;
          sections.push({
            section: 'Findings',
            api: 'Rule Engine',
            provider: 'n8n',
            detail: `${auditFindings.length} findings generated from signals`,
            result: `${open} open, ${auditFindings.length - open} resolved`,
          });
        }

        return sections;
      };

      // Rank map scans (separate from audits)
      const rmScans = rankMaps || [];

      const fmtDateTime = (iso) => {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
      };

      return (
        <div onClick={onClose} style={{position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.6)', zIndex:1000, display:'flex', justifyContent:'center', alignItems:'center', padding:'1rem'}}>
          <div onClick={e => e.stopPropagation()} style={{background:'#111', border:'1px solid #333', borderRadius:'12px', width:'100%', maxWidth:'720px', maxHeight:'90vh', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 8px 40px rgba(0,0,0,0.6)'}}>
            {/* Header */}
            <div style={{padding:'1.25rem 1.5rem', borderBottom:'1px solid #333', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0}}>
              <h3 style={{margin:0}}>Admin</h3>
              <button onClick={onClose} style={{background:'none', border:'none', color:'#888', fontSize:'1.5rem', cursor:'pointer', lineHeight:1}}>&times;</button>
            </div>

            {/* Tab bar */}
            <div style={{display:'flex', gap:'0.5rem', padding:'0.75rem 1.5rem', borderBottom:'1px solid #222', flexShrink:0}}>
              {adminTabBtn('runs', 'Audit Runs')}
              {adminTabBtn('settings', 'Settings')}
              {adminTabBtn('billing', 'Billing')}
            </div>

            {/* Content area */}
            <div style={{overflowY:'auto', padding:'1.5rem', flex:1}}>

              {/* ── RUNS TAB ─────────────────────────────── */}
              {adminTab === 'runs' && (
                <div>
                  {/* Run Audit button */}
                  <button onClick={auditStatus !== 'running' ? runAudit : undefined}
                    disabled={auditStatus === 'running' || !form.domain}
                    style={{
                      width:'100%', padding:'0.65rem', marginBottom:'1rem',
                      background: auditStatus === 'running' ? '#333' : '#EA9320',
                      color: auditStatus === 'running' ? '#888' : '#000',
                      border:'none', borderRadius:'6px', fontWeight:700, cursor: auditStatus === 'running' ? 'wait' : 'pointer',
                      fontSize:'0.9rem', fontFamily:'Roboto Slab, serif',
                    }}>
                    {auditStatus === 'running' ? 'Audit Running...' : 'Run New Audit'}
                  </button>

                  {/* Live Run Card — shows while audit is in progress */}
                  {auditStatus === 'running' && (
                    <LiveRunCard locationId={locationId} onComplete={() => {
                      setAuditStatus('idle');
                      setTimeout(() => window.location.reload(), 1500);
                    }} />
                  )}

                  {/* Unified chronological timeline: audits + rank map scans */}
                  {(() => {
                    // Build unified timeline items
                    const timeline = [];
                    audits.forEach(a => {
                      timeline.push({ type: 'audit', date: a.created_at, data: a });
                    });
                    (rmScans || []).forEach(rm => {
                      timeline.push({ type: 'rankmap', date: rm.created_at || rm.scan_date, data: rm });
                    });
                    // Sort chronologically (newest first)
                    timeline.sort((a, b) => new Date(b.date) - new Date(a.date));

                    return (
                      <div>
                        <h4 style={{color:'#EA9320', margin:'0 0 1rem', fontSize:'0.85rem', textTransform:'uppercase', letterSpacing:'0.5px'}}>
                          Report Timeline ({timeline.length} events)
                        </h4>
                        {timeline.map((item, idx) => {
                          if (item.type === 'audit') {
                            const a = item.data;
                            const sources = buildRunSources(a);
                            const scores = a.scores || {};
                            return (
                              <div key={'a-'+a.id} style={{background:'#0a0a0a', border:'1px solid #222', borderRadius:'8px', padding:'1rem', marginBottom:'1rem', borderLeft:'3px solid #EA9320'}}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.75rem'}}>
                                  <div>
                                    <span className="pill" style={{background:'rgba(234,147,32,0.15)', color:'#EA9320', marginRight:'0.5rem', fontSize:'0.7rem'}}>AUDIT</span>
                                    <span style={{fontWeight:700, fontSize:'1.05rem'}}>{fmtDateTime(a.created_at)}</span>
                                    <div style={{display:'flex', gap:'0.75rem', marginTop:'0.25rem', fontSize:'0.8rem'}}>
                                      <span style={{color:'#888'}}>{a.audit_type || 'full'} audit</span>
                                      {a.triggered_by && <span style={{color:'#555'}}>via {a.triggered_by}</span>}
                                      {a.crawler_source && <span style={{color:'#555'}}>{a.crawler_source}</span>}
                                    </div>
                                  </div>
                                  <div style={{
                                    width:'48px', height:'48px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                                    fontWeight:700, fontSize:'1.1rem', flexShrink:0,
                                    background: (scores.overall||0) >= 70 ? 'rgba(74,222,128,0.15)' : (scores.overall||0) >= 40 ? 'rgba(234,147,32,0.15)' : 'rgba(248,113,113,0.15)',
                                    color: (scores.overall||0) >= 70 ? '#4ade80' : (scores.overall||0) >= 40 ? '#EA9320' : '#f87171',
                                    border: '2px solid ' + ((scores.overall||0) >= 70 ? '#4ade80' : (scores.overall||0) >= 40 ? '#EA9320' : '#f87171'),
                                  }}>{scores.overall || '\u2014'}</div>
                                </div>
                                <div style={{display:'flex', gap:'1rem', marginBottom:'0.75rem', fontSize:'0.8rem', flexWrap:'wrap'}}>
                                  {scores.seo && <span style={{color:'#60a5fa'}}>SEO {scores.seo.score}</span>}
                                  {scores.geo_readiness && <span style={{color:'#f97316'}}>GEO {scores.geo_readiness.score}</span>}
                                  {scores.ai_discoverability && <span style={{color:'#a78bfa'}}>AI {scores.ai_discoverability.score}</span>}
                                </div>
                                <div style={{borderTop:'1px solid #1a1a1a', paddingTop:'0.75rem'}}>
                                  <div style={{fontSize:'0.7rem', color:'#666', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'0.5rem'}}>API Data Sources</div>
                                  <table style={{width:'100%', fontSize:'0.8rem'}}>
                                    <thead><tr>
                                      <th style={{textAlign:'left', padding:'4px 8px', borderBottom:'1px solid #222', fontSize:'0.7rem', color:'#666'}}>Section</th>
                                      <th style={{textAlign:'left', padding:'4px 8px', borderBottom:'1px solid #222', fontSize:'0.7rem', color:'#666'}}>API Source</th>
                                      <th style={{textAlign:'left', padding:'4px 8px', borderBottom:'1px solid #222', fontSize:'0.7rem', color:'#666'}}>Result</th>
                                    </tr></thead>
                                    <tbody>
                                      {sources.map((s, i) => (
                                        <tr key={i} style={{borderBottom:'1px solid #1a1a1a'}}>
                                          <td style={{padding:'5px 8px', fontWeight:600, color:'#ccc', whiteSpace:'nowrap'}}>{s.section}</td>
                                          <td style={{padding:'5px 8px'}}>
                                            <div style={{color:'#EA9320', fontWeight:500}}>{s.api}</div>
                                            <div style={{color:'#555', fontSize:'0.7rem'}}>{s.detail}</div>
                                          </td>
                                          <td style={{padding:'5px 8px', color:'#aaa', whiteSpace:'nowrap'}}>
                                            {s.link ? <a href={s.link} target="_blank" style={{color:'#EA9320', fontSize:'0.75rem'}}>view</a> : null}
                                            {s.result && <div>{s.result}</div>}
                                          </td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            );
                          } else {
                            const rm = item.data;
                            return (
                              <div key={'rm-'+rm.id} style={{background:'#0a0a0a', border:'1px solid #222', borderRadius:'8px', padding:'1rem', marginBottom:'1rem', borderLeft:'3px solid #60a5fa'}}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.5rem'}}>
                                  <div>

    /* ── FetchNewButton — per-section refresh via n8n webhook ── */
    function FetchNewButton({ locationId, section, label, onRefresh, hidden }) {
      const [state, setState] = React.useState('idle'); // idle | fetching | done | error
      if (hidden) return null;
      const [progress, setProgress] = React.useState(null);
      const channelRef = React.useRef(null);

      const start = async () => {
        setState('fetching');
        setProgress({ step: 'Starting...', pct: 0 });

        // Subscribe to Supabase Realtime for progress updates
        const channel = db.channel(`section-${section}-${Date.now()}`)
          .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'audit_progress',
            filter: `location_id=eq.${locationId}`,
          }, (payload) => {
            const row = payload.new;
            if (row && row.section === section) {
              setProgress({ step: row.step, pct: row.pct || 0 });
              if (row.step === 'complete') {
                setState('done');
                setTimeout(() => { setState('idle'); setProgress(null); }, 2000);
                if (onRefresh) onRefresh();
                channel.unsubscribe();
              }
            }
          })
          .subscribe();
        channelRef.current = channel;

        // Fire the webhook (don't await — it's async)
        try {
          fetch('https://tn.reinventingai.com/webhook/section-refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ locationId, section }),
          }).catch(() => {});
        } catch (e) { /* fire and forget */ }

        // Safety timeout — if no complete after 120s, reset
        setTimeout(() => {
          if (channelRef.current) channelRef.current.unsubscribe();
          setState(prev => prev === 'fetching' ? 'error' : prev);
        }, 120000);
      };

      React.useEffect(() => {
        return () => { if (channelRef.current) channelRef.current.unsubscribe(); };
      }, []);

      const colors = { idle: '#EA9320', fetching: '#60a5fa', done: '#4ade80', error: '#f87171' };
      const labels = { idle: label || 'Fetch New', fetching: progress?.step || 'Checking...', done: 'Done!', error: 'Timeout' };

      return (
        <button onClick={state === 'idle' || state === 'error' ? start : undefined} disabled={state === 'fetching'} style={{
          background: state === 'idle' ? '#EA9320' : state === 'done' ? '#4ade80' : state === 'error' ? '#f87171' : '#3b82f6',
          border: 'none',
          borderRadius: '8px', padding: '0.5rem 1.2rem', cursor: state === 'fetching' ? 'wait' : 'pointer',
          color: '#000', fontSize: '0.8rem', fontWeight: 700,
          fontFamily: 'Roboto, sans-serif', transition: 'all 0.2s',
          display: 'inline-flex', alignItems: 'center', gap: '0.5rem',
          boxShadow: '0 2px 6px rgba(0,0,0,0.3)',
        }}>
          {state === 'fetching' && <span style={{display:'inline-block', width:12, height:12, border:'2px solid #60a5fa', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 1s linear infinite'}} />}
          {state === 'done' && '\u2713'}
          {state === 'error' && '\u26A0'}
          {labels[state]}
          {state === 'fetching' && progress?.pct > 0 && <span style={{color:'#888'}}>({progress.pct}%)</span>}
        </button>
      );
    }

    /* ── Main App ────────────────────────────────────────── */
    function App() {
      const params = new URLSearchParams(window.location.search);
      const locationId = params.get('locationId');
      // GHL merge fields: address, city, state, postalCode are separate fields
      // Build full address from parts: {{location.address}}, {{location.city}}, {{location.state}} {{location.postalCode}}
      const addrParts = [
        params.get('address'),
        [params.get('city'), params.get('state')].filter(Boolean).join(', '),
        params.get('postalCode')
      ].filter(Boolean).join(', ');
      const urlDefaults = {
        website: params.get('website') || '',
        address: addrParts,
        phone: params.get('phone') || '',
      };

      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [site, setSite] = React.useState(null);
      const [audits, setAudits] = React.useState([]);
      const [findings, setFindings] = React.useState([]);
      const [geoSignals, setGeoSignals] = React.useState([]);
      const [aiMentions, setAiMentions] = React.useState([]);
      const [directoryListings, setDirectoryListings] = React.useState([]);
      const [rankMaps, setRankMaps] = React.useState([]);
      const [competitors, setCompetitors] = React.useState([]);
      const [linkChecklist, setLinkChecklist] = React.useState([]);
      const [billingRecords, setBillingRecords] = React.useState([]);
      const [usageLogs, setUsageLogs] = React.useState([]);
      const [activeTab, setActiveTab] = React.useState('overview');
      const [auditRunning, setAuditRunning] = React.useState(false);
      const [settingsOpen, setSettingsOpen] = React.useState(false);

      // Check if an audit is currently in progress (progress rows exist but not complete)
      React.useEffect(() => {
        if (!locationId || auditRunning) return;
        (async () => {
          try {
            const { data } = await db.from('audit_progress')
              .select('step,pct')
              .eq('location_id', locationId)
              .order('created_at', { ascending: false })
              .limit(1);
            if (data && data.length > 0 && data[0].step !== 'complete') {
              setAuditRunning(true);
            }
          } catch (e) { /* ignore */ }
        })();
      }, [locationId]);

      React.useEffect(() => {
        if (!locationId) { setLoading(false); return; }
        let canceled = false;

        (async () => {
          try {
            const { data: siteData, error: siteErr } = await db.from('sites').select('*').eq('ghl_location_id', locationId).maybeSingle();
            if (siteErr) throw siteErr;
            if (canceled) return;
            if (!siteData) { setLoading(false); return; }
            setSite(siteData);

            // Fetch all tables in parallel — gracefully handle missing tables
            const queries = [
              db.from('audits').select('*').eq('site_id', siteData.id).order('audit_date', {ascending:true}),
              db.from('findings').select('*').eq('site_id', siteData.id),
              db.from('geo_signals').select('*').eq('site_id', siteData.id),
              db.from('ai_mentions').select('*').eq('site_id', siteData.id),
              db.from('rank_maps').select('*').eq('site_id', siteData.id).order('scan_date', {ascending:false}),
              db.from('competitors').select('*').eq('site_id', siteData.id).order('created_at', {ascending:false}),
              db.from('link_checklist').select('*').eq('site_id', siteData.id).order('priority', {ascending:true}),
              db.from('directory_listings').select('*').eq('site_id', siteData.id),
              db.from('audit_billing').select('*').eq('site_id', siteData.id).order('audit_date', {ascending:false}),
              db.from('apify_usage_log').select('*').eq('site_id', siteData.id).order('created_at', {ascending:false}),
            ];

            const results = await Promise.allSettled(queries);
            if (canceled) return;

            const safe = (r) => r.status === 'fulfilled' && !r.value.error ? r.value.data || [] : [];
            setAudits(safe(results[0]));
            setFindings(safe(results[1]));
            setGeoSignals(safe(results[2]));
            setAiMentions(safe(results[3]));
            setRankMaps(safe(results[4]));
            setCompetitors(safe(results[5]));
            setLinkChecklist(safe(results[6]));
            setDirectoryListings(safe(results[7]));
            setBillingRecords(safe(results[8]));
            setUsageLogs(safe(results[9]));
          } catch (e) {
            console.error('Dashboard load error:', e);
            if (!canceled) setError(e);
            return;
          } finally {
            if (!canceled) setLoading(false);
          }
        })();

        return () => { canceled = true; };
      }, [locationId]);

      // Section refreshers — re-fetch a single table after n8n updates it
      const refreshSection = React.useCallback(async (section) => {
        if (!site) return;
        const id = site.id;
        const fetchers = {
          directories: async () => { const { data } = await db.from('directory_listings').select('*').eq('site_id', id); if (data) setDirectoryListings(data); },
          rankmap: async () => { const { data } = await db.from('rank_maps').select('*').eq('site_id', id).order('scan_date', {ascending:false}); if (data) setRankMaps(data); },
          competitors: async () => { const { data } = await db.from('competitors').select('*').eq('site_id', id).order('created_at', {ascending:false}); if (data) setCompetitors(data); },
          findings: async () => { const { data } = await db.from('findings').select('*').eq('site_id', id); if (data) setFindings(data); },
          geo: async () => { const { data } = await db.from('geo_signals').select('*').eq('site_id', id); if (data) setGeoSignals(data); },
          ai: async () => { const { data } = await db.from('ai_mentions').select('*').eq('site_id', id); if (data) setAiMentions(data); },
          keywords: async () => { /* keyword_suggestions fetched separately */ },
        };
        if (fetchers[section]) await fetchers[section]();
      }, [site]);

      if (!locationId) return <div className="container"><h2>Missing location parameter</h2><p>Add ?locationId=YOUR_GHL_LOCATION_ID to the URL</p></div>;
      if (loading) return <div className="container" style={{textAlign:'center',paddingTop:'4rem'}}><h2>Loading dashboard...</h2></div>;

      /* ── Empty / No-Data State — friendly CTA ─────────── */
      if (error || !site || audits.length === 0) {
        if (auditRunning) {
          return <AuditProcessingScreen locationId={locationId} />;
        }
        return (
          <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
            <div style={{fontSize:'4rem', marginBottom:'1rem'}}>&#x1F50D;</div>
            <h1 style={{margin:'0 0 0.5rem 0'}}>SEO & GEO Audit Dashboard</h1>
            <p style={{color:'#888', fontSize:'1.1rem', margin:'0 0 2rem 0'}}>
              {site ? site.business_name : 'Your business'} doesn't have an audit report yet.
            </p>
            <RunAuditButton locationId={locationId} lastAuditDate={null} showForm={true} defaults={urlDefaults} onAuditStarted={() => setAuditRunning(true)} />
            <p style={{color:'#555', fontSize:'0.85rem', marginTop:'1.5rem'}}>
              We'll analyze your site across SEO, AI discoverability, GEO signals, directory listings, and more.
            </p>
            <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
              Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
            </footer>
          </div>
        );
      }

      const latest = audits[audits.length - 1];
      const scores = latest.scores || {};
      const delta = latest.delta || {};
      const core30 = latest.core30_coverage || null;
      const contentBriefs = latest.content_briefs || [];
      const homepageSections = latest.homepage_sections || null;

      const chartData = audits.map(a => ({
        date: a.audit_date,
        Overall: a.scores?.overall ?? 0,
        SEO: a.scores?.seo?.score ?? 0,
        AI: a.scores?.ai_discoverability?.score ?? 0,
        GEO: a.scores?.geo_readiness?.score ?? 0,
      }));

      const latestFindings = findings.filter(f => f.audit_id === latest.id);
      const latestGeo = geoSignals.filter(g => g.audit_id === latest.id);
      const quickWins = latestFindings.filter(f => f.effort_minutes <= 15 && f.impact === 'high' && f.status === 'open');
      const latestRankMap = rankMaps.length > 0 ? rankMaps[0] : null;

      // Compute AI score from ai_mentions data (overrides stored null)
      const aiScoreFromMentions = aiMentions.length > 0
        ? Math.round(aiMentions.filter(m => m.mentioned).length / aiMentions.length * 100)
        : null;
      if (aiScoreFromMentions !== null) {
        if (!scores.ai_discoverability) scores.ai_discoverability = {};
        scores.ai_discoverability.score = aiScoreFromMentions;
        // Recalculate overall with AI data: SEO 40% + AI 15% + GEO 45%
        const seoScore = scores.seo?.score || 0;
        const geoScore = scores.geo_readiness?.score || 0;
        scores.overall = Math.round(seoScore * 0.4 + aiScoreFromMentions * 0.15 + geoScore * 0.45);
      }

      const openFindings = latestFindings.filter(f => f.status === 'open').length;
      const dirNeedsAtt = directoryListings.filter(l => l.status !== 'listed').length;
      const missingPages = (core30?.categories_missing||0) + (core30?.services_missing||0);

      const hpMissing = homepageSections?.missing || 0;

      const tabs = [
        { id:'overview', label:'Overview' },
        { id:'homepage', label:'Homepage', badge: hpMissing > 0 ? hpMissing : null },
        { id:'rankmap', label:'Rank Map', badge: latestRankMap ? latestRankMap.top_3_pct+'%' : null },
        { id:'core30', label:'Core 30', badge: missingPages > 0 ? missingPages : null },
        { id:'insights', label:'Insights', badge: openFindings || null },
        { id:'directories', label:'Directories & Links', badge: dirNeedsAtt || null },
        { id:'competitors', label:'Competitors' },
        { id:'clarity', label:'Clarity', badge: site.social_links?.clarity_token ? null : null },
      ];

      return (
        <div className="container">
          <header style={{marginBottom:'1.5rem', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <h1 style={{margin:'0 0 0.25rem 0'}}>{site.business_name}</h1>
              <p style={{margin:0, color:'#888'}}>{site.domain} &bull; {site.target_city||site.city}, {site.target_state||site.state} &bull; Last audit: {latest.audit_date}</p>
            </div>
            <button onClick={() => setSettingsOpen(!settingsOpen)} style={{
              background: settingsOpen ? '#EA9320' : 'none', border:'1px solid ' + (settingsOpen ? '#EA9320' : '#333'),
              borderRadius:'6px', padding:'0.5rem 1rem',
              color: settingsOpen ? '#000' : '#888', cursor:'pointer', fontSize:'0.85rem', fontWeight:600,
              fontFamily:'Roboto, sans-serif', marginTop:'0.25rem', transition:'all 0.2s',
            }}>{settingsOpen ? 'Close' : 'Admin'}</button>
          </header>
          <AdminPanel site={site} open={settingsOpen} onClose={() => setSettingsOpen(false)} billingRecords={billingRecords} usageLogs={usageLogs} locationId={locationId} lastAuditDate={latest.audit_date} onAuditStarted={() => setAuditRunning(true)} audits={audits} findings={findings} geoSignals={geoSignals} aiMentions={aiMentions} rankMaps={rankMaps} />

          <nav className="tab-bar">
            {tabs.map(t => (
              <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>
                {t.label}
                {t.badge != null && <span className="badge">{t.badge}</span>}
              </button>
            ))}
          </nav>

          {activeTab === 'overview' && <OverviewTab scores={scores} delta={delta} chartData={chartData} quickWins={quickWins} rankMap={latestRankMap} core30={core30} homepageSections={homepageSections} apifyResults={latest.apify_results || {}} locationId={locationId} site={site} lastAuditDate={latest.audit_date} onAuditStarted={() => setAuditRunning(true)} auditRunning={auditRunning} />}
          {activeTab === 'homepage' && <HomepageTab homepageSections={homepageSections} />}
          {activeTab === 'rankmap' && <RankMapTab rankMaps={rankMaps} locationId={locationId} onRefresh={() => refreshSection('rankmap')} auditRunning={auditRunning} />}
          {activeTab === 'core30' && <Core30Tab core30={core30} contentBriefs={contentBriefs} />}
          {activeTab === 'insights' && <InsightsTab latestFindings={latestFindings} latestGeo={latestGeo} aiMentions={aiMentions} businessName={site.business_name} locationId={locationId} onRefresh={refreshSection} auditRunning={auditRunning} />}
          {activeTab === 'directories' && <DirectoryTab listings={directoryListings} site={site} locationId={locationId} onRefresh={() => refreshSection('directories')} links={linkChecklist} auditRunning={auditRunning} />}
          {activeTab === 'competitors' && <CompetitorsTab competitors={competitors} site={site} aiMentions={aiMentions} locationId={locationId} onRefresh={() => refreshSection('competitors')} auditRunning={auditRunning} />}
          {activeTab === 'clarity' && <ClarityTab clarityToken={site.social_links?.clarity_token} />}

          <footer style={{marginTop:'2rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a> &bull; Site Audit System v3.0
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
