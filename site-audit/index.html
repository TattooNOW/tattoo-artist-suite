<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TattooNOW Audit Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script>window.PropTypes = window.PropTypes || window.propTypes;</script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body, html { margin:0; padding:0; background:#0a0a0a; color:#fafafa; font-family:'Roboto',sans-serif; }
    h1,h2,h3,h4,h5 { font-family:'Roboto Slab',serif; }
    a { color:#EA9320; }
    .container { padding:20px; max-width:1200px; margin:0 auto; }
    table { width:100%; border-collapse:collapse; }
    table th { text-align:left; padding:8px 12px; border-bottom:2px solid #333; font-size:0.85rem; text-transform:uppercase; color:#888; letter-spacing:0.5px; }
    table td { padding:6px 12px; border-bottom:1px solid #222; }
    .card { background:#1a1a1a; padding:1.5rem; border-radius:8px; }
    .score-card { flex:1; background:#252525; padding:0.75rem 1rem; border-radius:8px; text-align:center; min-width:80px; }
    .score-card h3 { margin:0 0 0.25rem 0; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; color:#999; }
    .score-card .value { font-size:1.6rem; font-weight:700; }
    .score-card .delta { font-size:0.85rem; margin-top:0.15rem; }
    .hero-metric { text-align:center; padding:2rem 1rem; margin-bottom:2rem; background:linear-gradient(135deg, #1a1a1a 0%, #111 100%); border-radius:12px; border:1px solid #333; }
    .hero-metric .hero-value { font-size:5rem; font-weight:700; line-height:1; }
    .hero-metric .hero-label { font-size:1.1rem; color:#888; margin-top:0.5rem; }
    .hero-metric .hero-sub { font-size:0.9rem; color:#666; margin-top:0.25rem; }
    .tab-bar { display:flex; gap:0; border-bottom:2px solid #333; margin-bottom:2rem; overflow-x:auto; }
    .tab-btn {
      padding:0.75rem 1.25rem; background:none; border:none; border-bottom:3px solid transparent;
      color:#888; font-family:'Roboto',sans-serif; font-size:0.9rem; font-weight:500;
      cursor:pointer; white-space:nowrap; transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color:#ccc; }
    .tab-btn.active { color:#EA9320; border-bottom-color:#EA9320; }
    .tab-btn .badge {
      display:inline-block; margin-left:0.5rem; padding:0.1rem 0.5rem; border-radius:10px;
      font-size:0.75rem; font-weight:700; background:#333; color:#aaa;
    }
    .tab-btn.active .badge { background:#EA9320; color:#000; }
    .grid-cell {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      font-size:0.7rem; font-weight:700; border-radius:4px; border:1px solid #333;
    }
    .pill { display:inline-block; padding:0.15rem 0.6rem; border-radius:10px; font-size:0.75rem; font-weight:600; }
    .progress-bar { background:#333; border-radius:4px; height:8px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
    .rank-popup .leaflet-popup-content-wrapper { background:#1a1a1a; color:#fafafa; border:1px solid #333; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.6); }
    .rank-popup .leaflet-popup-tip { background:#1a1a1a; border:1px solid #333; }
    .rank-popup .leaflet-popup-content { margin:12px 14px; color:#fafafa; }
    .rank-popup .leaflet-popup-content div { color:#fafafa !important; }
    .rank-popup .leaflet-popup-content span { color:#aaa; }
    .rank-popup .leaflet-popup-close-button { color:#888 !important; }
    .rank-popup .leaflet-popup-close-button:hover { color:#fff !important; }
    .rank-tooltip { background:#1a1a1a !important; color:#EA9320 !important; border:1px solid #EA9320 !important; font-family:Roboto,sans-serif !important; }
    .rank-tooltip-card { background:#fff !important; color:#222 !important; border:1px solid #ddd !important; border-radius:8px !important; box-shadow:0 4px 16px rgba(0,0,0,0.25) !important; padding:6px 8px !important; font-family:Roboto,sans-serif !important; }
    .rank-tooltip-card .leaflet-tooltip-content { color:#222 !important; }
    .rank-tooltip-card::before { border-top-color:#fff !important; }
    select.filter { background:#1a1a1a; color:#fafafa; border:1px solid #333; padding:0.4rem 0.8rem; border-radius:4px; }
  </style>
</head>
<body>
  <div id="root">Loading...</div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const SUPABASE_URL = 'https://dwoqhaaugczqsymfirqu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YYTjG-yaVaj7bpfKyIJupw_ATKZvk0N';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Helpers ─────────────────────────────────────────── */
    const getDeltaArrow = v => v > 0 ? '\u25B2' : v < 0 ? '\u25BC' : '\u2014';
    const deltaColor = v => v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#666';
    const sevColor = s => ({ critical:'#ef4444', high:'#f87171', medium:'#fbbf24', low:'#60a5fa' }[s] || '#888');
    const rankColor = r => {
      if (r === null || r === undefined || r > 20) return '#333';
      if (r <= 3) return '#4ade80'; if (r <= 7) return '#a3e635';
      if (r <= 10) return '#fbbf24'; if (r <= 15) return '#f97316'; return '#f87171';
    };
    const rankBg = r => {
      if (r === null || r === undefined || r > 20) return '#1a1a1a';
      if (r <= 3) return 'rgba(74,222,128,0.15)'; if (r <= 7) return 'rgba(163,230,53,0.12)';
      if (r <= 10) return 'rgba(251,191,36,0.12)'; if (r <= 15) return 'rgba(249,115,22,0.12)'; return 'rgba(248,113,113,0.12)';
    };
    const statusIcon = s => s === 'listed' ? '\u2705' : (s === 'needs_fix' || s === 'needs_claim') ? '\u26A0\uFE0F' : '\u274C';
    const statusLabel = s => ({ listed:'Listed', needs_fix:'Needs Fix', needs_claim:'Needs Claim', not_listed:'Not Listed' }[s] || s);
    const statusRowBg = s => ({ listed:'rgba(74,222,128,0.08)', needs_fix:'rgba(251,191,36,0.08)', needs_claim:'rgba(251,191,36,0.08)', not_listed:'rgba(248,113,113,0.08)' }[s] || 'transparent');
    const priorityColor = p => ({ P0:'#ef4444', P1:'#fbbf24', P2:'#60a5fa' }[p] || '#888');

    /* ── Component: Run Audit Button ─────────────────────── */
    const AUDIT_WEBHOOK = 'https://tn.reinventingai.com/webhook/run-audit';

    function RunAuditButton({ locationId, lastAuditDate, showForm, defaults, onAuditStarted }) {
      const [status, setStatus] = React.useState('idle'); // idle | running | done | error
      const [domain, setDomain] = React.useState(defaults?.website || '');
      const [address, setAddress] = React.useState(defaults?.address || '');
      const [phone, setPhone] = React.useState(defaults?.phone || '');

      const runAudit = () => {
        if (!domain) return;
        setStatus('running');
        // Fire webhook in background — don't block the UI transition
        fetch(AUDIT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ locationId, domain, address, phone })
        }).then(res => console.log('Webhook response:', res.status, res.ok))
          .catch(e => console.error('Audit trigger failed:', e));
        // Immediately transition to processing screen
        if (onAuditStarted) onAuditStarted();
      };

      const inputStyle = { background:'#111', color:'#fafafa', border:'1px solid #333', padding:'0.5rem 0.75rem', borderRadius:'4px', width:'100%', fontSize:'0.9rem', fontFamily:'Roboto, sans-serif', boxSizing:'border-box' };

      /* Inline refresh button (non-CTA, used inside dashboard) */
      if (!showForm) {
        const btnStyles = {
          idle: { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' },
          running: { background:'#333', color:'#888', cursor:'wait', border:'1px solid #444' },
          done: { background:'#4ade80', color:'#000', cursor:'default', border:'none' },
        };
        const btnText = { idle:'Run Audit', running:'Sending...', done:'Audit Running...' };
        return (
          <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
            <h3 style={{marginTop:0, color:'#888'}}>Refresh Audit Data</h3>
            <button type="button" onClick={status !== 'running' && status !== 'done' ? runAudit : undefined}
              disabled={status === 'running' || status === 'done'}
              style={{ padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem', borderRadius:'6px', transition:'background 0.2s', ...btnStyles[status] }}>
              {btnText[status]}
            </button>
            <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>
              {lastAuditDate ? `Auto-runs every Sunday at 3am \u2022 Last run: ${lastAuditDate}` : 'Takes about 30 seconds'}
            </p>
          </section>
        );
      }

      /* Full CTA form */
      return (
        <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
          <h3 style={{marginTop:0, color:'#888'}}>Run Your First Audit</h3>
          <div style={{maxWidth:'400px', margin:'0 auto 1.5rem', textAlign:'left', display:'flex', flexDirection:'column', gap:'0.75rem'}}>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Website</label>
              <input value={domain} onChange={e => setDomain(e.target.value)} placeholder="example.com" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Address</label>
              <input value={address} onChange={e => setAddress(e.target.value)} placeholder="123 Main St, City, ST 00000" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Phone</label>
              <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="(555) 123-4567" style={inputStyle} />
            </div>
          </div>
          <button type="button" onClick={runAudit} disabled={!domain}
            style={{
              padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem',
              borderRadius:'6px', transition:'background 0.2s',
              ...(!domain ? { background:'#333', color:'#666', cursor:'not-allowed', border:'1px solid #444' }
                         : { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' })
            }}>
            Request Your Free Audit
          </button>
          <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>Takes about 30 seconds</p>
        </section>
      );
    }

    /* ── Component: Audit Processing Screen ───────────────── */
    function AuditProcessingScreen({ locationId }) {
      const [dots, setDots] = React.useState('');
      const [elapsed, setElapsed] = React.useState(0);
      const [found, setFound] = React.useState(false);
      const [liveStep, setLiveStep] = React.useState('starting');
      const [livePct, setLivePct] = React.useState(5);
      const [liveMsg, setLiveMsg] = React.useState('Starting audit...');

      const steps = [
        { key: 'starting',     label: 'Starting audit',              pct: 10 },
        { key: 'site_located', label: 'Site located',                pct: 20 },
        { key: 'crawling',     label: 'Crawling your website',       pct: 35 },
        { key: 'analyzing',    label: 'Analyzing HTML & content',    pct: 50 },
        { key: 'scoring',      label: 'Scoring SEO, AI & GEO signals', pct: 65 },
        { key: 'writing',      label: 'Writing audit report',        pct: 80 },
        { key: 'complete',     label: 'Audit complete!',             pct: 100 },
      ];

      // Animate dots
      React.useEffect(() => {
        const iv = setInterval(() => setDots(d => d.length >= 3 ? '' : d + '.'), 500);
        return () => clearInterval(iv);
      }, []);

      // Track elapsed time
      React.useEffect(() => {
        const iv = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(iv);
      }, []);

      // Subscribe to Supabase Realtime for progress updates from n8n
      React.useEffect(() => {
        if (!locationId) return;

        const channel = db.channel('audit-progress-' + locationId)
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'audit_progress',
            filter: 'location_id=eq.' + locationId,
          }, (payload) => {
            const row = payload.new;
            console.log('Progress update:', row);
            setLiveStep(row.step);
            setLivePct(row.pct);
            setLiveMsg(row.message || row.step);
            if (row.step === 'complete') {
              setFound(true);
              setTimeout(() => window.location.reload(), 2000);
            }
          })
          .subscribe((status) => {
            console.log('Realtime subscription:', status);
          });

        return () => { db.removeChannel(channel); };
      }, [locationId]);

      // Fallback: poll Supabase for audit results every 8 seconds in case Realtime misses
      React.useEffect(() => {
        if (!locationId || found) return;
        let canceled = false;

        const poll = async () => {
          try {
            const { data: siteData } = await db.from('sites').select('id').eq('ghl_location_id', locationId).maybeSingle();
            if (!siteData || canceled) return;
            const { data: audits } = await db.from('audits').select('id').eq('site_id', siteData.id).limit(1);
            if (canceled) return;
            if (audits && audits.length > 0) {
              setFound(true);
              setLiveStep('complete');
              setLivePct(100);
              setLiveMsg('Audit complete!');
              setTimeout(() => window.location.reload(), 2000);
            }
          } catch (e) { console.error('Poll error:', e); }
        };

        let pollIv = null;
        const start = setTimeout(() => {
          poll();
          pollIv = setInterval(poll, 8000);
        }, 15000);

        return () => { canceled = true; clearTimeout(start); if (pollIv) clearInterval(pollIv); };
      }, [locationId, found]);

      // Derive step statuses from live data
      const currentStepIdx = steps.findIndex(s => s.key === liveStep);
      const progress = found ? 100 : livePct;

      return (
        <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
          {/* Animated spinner */}
          <div style={{marginBottom:'2rem'}}>
            <div style={{
              width:'80px', height:'80px', margin:'0 auto',
              border:'4px solid #333', borderTop:'4px solid #EA9320',
              borderRadius:'50%',
              animation: found ? 'none' : 'spin 1s linear infinite',
              background: found ? '#4ade80' : 'transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.5s',
            }}>
              {found && <span style={{fontSize:'2rem'}}>&#x2714;</span>}
            </div>
          </div>

          <style dangerouslySetInnerHTML={{__html: `
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
          `}} />

          <h1 style={{margin:'0 0 0.5rem 0', color: found ? '#4ade80' : '#fafafa'}}>
            {found ? 'Audit Complete!' : 'Analyzing Your Site'}
          </h1>

          <p style={{color:'#EA9320', fontSize:'1.2rem', fontWeight:500, margin:'0 0 2rem 0', minHeight:'1.5em'}}>
            {found ? 'Loading your report...' : liveMsg + dots}
          </p>

          {/* Progress bar */}
          <div style={{maxWidth:'400px', margin:'0 auto 2rem'}}>
            <div className="progress-bar" style={{height:'10px', borderRadius:'5px'}}>
              <div className="progress-fill" style={{
                width: progress + '%',
                background: found ? '#4ade80' : 'linear-gradient(90deg, #EA9320, #f5c542)',
                transition:'width 1s ease-out',
              }} />
            </div>
            <p style={{color:'#666', fontSize:'0.8rem', marginTop:'0.5rem'}}>
              {found ? 'Done!' : `${progress}% \u2022 ${elapsed}s elapsed`}
            </p>
          </div>

          {/* Step checklist — driven by live n8n progress */}
          <div style={{textAlign:'left', maxWidth:'350px', margin:'0 auto'}}>
            {steps.map((s, i) => {
              const done = i < currentStepIdx || found;
              const active = i === currentStepIdx && !found;
              return (
                <div key={s.key} style={{
                  display:'flex', alignItems:'center', gap:'0.75rem',
                  padding:'0.4rem 0', color: done ? '#4ade80' : active ? '#EA9320' : '#555',
                  fontSize:'0.9rem', transition:'color 0.3s',
                }}>
                  <span style={{width:'20px', textAlign:'center', fontSize:'0.85rem'}}>
                    {done ? '\u2713' : active ? '\u25CF' : '\u25CB'}
                  </span>
                  <span style={{animation: active ? 'pulse 1.5s ease-in-out infinite' : 'none'}}>
                    {s.label}
                  </span>
                </div>
              );
            })}
          </div>

          {elapsed > 90 && !found && (
            <p style={{color:'#f87171', fontSize:'0.85rem', marginTop:'2rem'}}>
              Taking longer than expected... <a href="javascript:void(0)" onClick={() => window.location.reload()} style={{color:'#EA9320'}}>Reload manually</a>
            </p>
          )}

          <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
          </footer>
        </div>
      );
    }

    /* ── Component: Live Run Card (inline in Admin Runs tab) ── */
    function LiveRunCard({ locationId, onComplete }) {
      const [elapsed, setElapsed] = React.useState(0);
      const [liveStep, setLiveStep] = React.useState('starting');
      const [livePct, setLivePct] = React.useState(5);
      const [liveMsg, setLiveMsg] = React.useState('Starting audit...');
      const [done, setDone] = React.useState(false);
      const [error, setError] = React.useState(null);
      const startTime = React.useRef(Date.now());

      const steps = [
        { key: 'starting',     label: 'Starting audit',              icon: '\u{1F680}' },
        { key: 'site_located', label: 'Site located',                icon: '\u{1F4CD}' },
        { key: 'crawling',     label: 'Crawling website',            icon: '\u{1F578}' },
        { key: 'analyzing',    label: 'Analyzing HTML & content',    icon: '\u{1F50D}' },
        { key: 'scoring',      label: 'Scoring SEO, AI & GEO',      icon: '\u{1F4CA}' },
        { key: 'writing',      label: 'Writing audit report',        icon: '\u{270D}' },
        { key: 'complete',     label: 'Audit complete!',             icon: '\u2705' },
      ];

      // Elapsed timer
      React.useEffect(() => {
        if (done) return;
        const iv = setInterval(() => setElapsed(Math.round((Date.now() - startTime.current) / 1000)), 1000);
        return () => clearInterval(iv);
      }, [done]);

      // Subscribe to audit_progress via Supabase Realtime
      React.useEffect(() => {
        if (!locationId) return;
        const channel = db.channel('live-run-' + locationId + '-' + Date.now())
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'audit_progress',
            filter: 'location_id=eq.' + locationId,
          }, (payload) => {
            const row = payload.new;
            setLiveStep(row.step);
            setLivePct(row.pct || 0);
            setLiveMsg(row.message || row.step);
            if (row.step === 'complete') {
              setDone(true);
              if (onComplete) setTimeout(onComplete, 1500);
            }
            if (row.step === 'error') {
              setError(row.message || 'Audit failed');
              setDone(true);
            }
          })
          .subscribe();
        return () => { db.removeChannel(channel); };
      }, [locationId]);

      // Fallback poll: check for new audits every 10s
      React.useEffect(() => {
        if (!locationId || done) return;
        let canceled = false;
        const poll = async () => {
          try {
            const { data: siteData } = await db.from('sites').select('id').eq('ghl_location_id', locationId).maybeSingle();
            if (!siteData || canceled) return;
            const { data: prog } = await db.from('audit_progress').select('step,pct,message')
              .eq('location_id', locationId).order('created_at', { ascending: false }).limit(1);
            if (canceled) return;
            if (prog && prog.length > 0) {
              setLiveStep(prog[0].step);
              setLivePct(prog[0].pct || 0);
              setLiveMsg(prog[0].message || prog[0].step);
              if (prog[0].step === 'complete') {
                setDone(true);
                if (onComplete) setTimeout(onComplete, 1500);
              }
            }
          } catch (e) { /* ignore */ }
        };
        const iv = setInterval(poll, 10000);
        // Also poll once after 5s in case realtime is slow
        const t = setTimeout(poll, 5000);
        return () => { canceled = true; clearInterval(iv); clearTimeout(t); };
      }, [locationId, done]);

      const currentStepIdx = steps.findIndex(s => s.key === liveStep);
      const fmtElapsed = (s) => s < 60 ? s + 's' : Math.floor(s / 60) + 'm ' + (s % 60) + 's';

      return (
        <div style={{
          background: done && !error ? 'rgba(74,222,128,0.05)' : error ? 'rgba(248,113,113,0.05)' : 'rgba(234,147,32,0.05)',
          border: '1px solid ' + (done && !error ? '#4ade80' : error ? '#f87171' : '#EA9320'),
          borderRadius: '10px', padding: '1.25rem', marginBottom: '1.5rem',
          animation: done ? 'none' : 'pulse 2s ease-in-out infinite',
        }}>
          {/* Header row */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
            <div style={{display:'flex', alignItems:'center', gap:'0.75rem'}}>
              {!done && <div style={{
                width:'20px', height:'20px', border:'3px solid #333', borderTop:'3px solid #EA9320',
                borderRadius:'50%', animation:'spin 1s linear infinite',
              }} />}
              {done && !error && <span style={{fontSize:'1.2rem'}}>{'\u2705'}</span>}
              {error && <span style={{fontSize:'1.2rem'}}>{'\u274C'}</span>}
              <span style={{fontWeight:700, fontSize:'1rem', color: done && !error ? '#4ade80' : error ? '#f87171' : '#EA9320'}}>
                {done && !error ? 'Audit Complete!' : error ? 'Audit Failed' : 'Audit Running...'}
              </span>
            </div>
            <span style={{color:'#888', fontSize:'0.8rem', fontFamily:'monospace'}}>{fmtElapsed(elapsed)}</span>
          </div>

          {/* Progress bar */}

    /* ── AuditRunCard — unified run button + progress tracker ── */
    function AuditRunCard({ locationId, site, lastAuditDate, onAuditStarted, auditRunning }) {
      const [status, setStatus] = React.useState(auditRunning ? 'running' : 'idle');
      const [sections, setSections] = React.useState([]);
      const channelRef = React.useRef(null);

      const allSections = [
        { key: 'homepage', label: 'Homepage crawl & SEO' },
        { key: 'core30', label: 'Core 30 analysis' },
        { key: 'geo', label: 'GEO signal detection' },
        { key: 'ai_probes', label: 'AI mention probing' },
        { key: 'rankmap', label: 'Rank map scan' },
        { key: 'directories', label: 'Directory verification' },
        { key: 'competitors', label: 'Competitor intelligence' },
        { key: 'findings', label: 'Findings generation' },
      ];

      // Monthly credit refill check
      const checkRefill = React.useCallback(async () => {
        if (!site) return;
        const lastRefill = new Date(site.credits_last_refill || 0);
        const now = new Date();
        if (lastRefill.getMonth() !== now.getMonth() || lastRefill.getFullYear() !== now.getFullYear()) {
          const newBalance = (site.credits_remaining || 0) + (site.credits_monthly || 1);
          await db.from('sites').update({
            credits_remaining: newBalance,
            credits_last_refill: now.toISOString(),
          }).eq('id', site.id);
          await db.from('credit_transactions').insert({
            site_id: site.id, amount: site.credits_monthly || 1,
            balance_after: newBalance, type: 'monthly_refill',
            description: 'Monthly free credit',
          });
          site.credits_remaining = newBalance;
        }
      }, [site]);

      React.useEffect(() => { checkRefill(); }, [checkRefill]);

      // Subscribe to progress when running
      React.useEffect(() => {
        if (status !== 'running' || !locationId) return;
        const channel = db.channel(`audit-run-${Date.now()}`)
          .on('postgres_changes', {
            event: '*', schema: 'public', table: 'audit_progress',
            filter: `location_id=eq.${locationId}`,
          }, (payload) => {
            const row = payload.new;
            if (!row) return;
            const sec = row.section || 'full';
            if (row.step === 'complete' && sec === 'full') {
              setStatus('done');
              setTimeout(() => setStatus('idle'), 3000);
              channel.unsubscribe();
              return;
            }
            setSections(prev => {
              const updated = [...prev];
              const idx = updated.findIndex(s => s.key === sec);
              if (idx >= 0) {
                updated[idx] = { ...updated[idx], status: row.step === 'complete' ? 'done' : 'active', step: row.step, pct: row.pct };
              } else if (sec !== 'full') {
                updated.push({ key: sec, status: row.step === 'complete' ? 'done' : 'active', step: row.step, pct: row.pct });
              }
              return updated;
            });
          })
          .subscribe();
        channelRef.current = channel;
        return () => { if (channelRef.current) channelRef.current.unsubscribe(); };
      }, [status, locationId]);

      const runAudit = async () => {
        if (!site || (site.credits_remaining || 0) <= 0) return;

        // Deduct credit
        const newBalance = (site.credits_remaining || 0) - 1;
        await db.from('sites').update({ credits_remaining: newBalance }).eq('id', site.id);
        await db.from('credit_transactions').insert({
          site_id: site.id, amount: -1, balance_after: newBalance,
          type: 'usage', description: 'Full audit report',
        });
        site.credits_remaining = newBalance;

        setStatus('running');
        setSections([]);

        // Fire webhook
        fetch('https://tn.reinventingai.com/webhook/run-audit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ locationId, domain: site.domain, address: site.address, phone: site.phone }),
        }).catch(() => {});

        if (onAuditStarted) onAuditStarted();
      };

      const credits = site?.credits_remaining || 0;
      const doneCount = sections.filter(s => s.status === 'done').length;
      const activeSection = sections.find(s => s.status === 'active');
      const overallPct = status === 'running' ? Math.round((doneCount / allSections.length) * 100) : 0;

      return (
        <div style={{
          background: '#1a1a1a', border: '1px solid #333', borderRadius: '10px',
          padding: '1.25rem 1.5rem', marginBottom: '1.5rem',
        }}>
          {status === 'idle' || status === 'done' ? (
            <>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.75rem'}}>
                <h3 style={{margin:0, fontSize:'1rem'}}>
                  {status === 'done' ? '\u2713 Audit Complete' : 'Run Full Audit'}
                </h3>
                <span style={{
                  background: credits > 0 ? '#252525' : 'rgba(248,113,113,0.15)',
                  border: '1px solid ' + (credits > 0 ? '#444' : '#f87171'),
                  borderRadius: '20px', padding: '0.25rem 0.75rem',
                  fontSize: '0.75rem', color: credits > 0 ? '#ccc' : '#f87171',
                }}>
                  {credits} credit{credits !== 1 ? 's' : ''} remaining
                </span>
              </div>
              <div style={{fontSize:'0.8rem', color:'#888', marginBottom:'1rem', lineHeight:1.5}}>
                Homepage SEO, Core 30, GEO Signals, AI Mentions, Rank Map, Directories, Competitors, Findings
              </div>
              {credits > 0 ? (
                <button onClick={runAudit} style={{
                  background: '#EA9320', color: '#000', border: 'none',
                  borderRadius: '8px', padding: '0.6rem 1.5rem', cursor: 'pointer',
                  fontWeight: 700, fontSize: '0.9rem', fontFamily: 'Roboto, sans-serif',
                  boxShadow: '0 2px 8px rgba(234,147,32,0.3)',
                }}>
                  Run Audit — 1 credit
                </button>
              ) : (
                <div>
                  <div style={{color:'#f87171', fontSize:'0.85rem', marginBottom:'0.5rem'}}>
                    No credits remaining. 5-report pack: $10
                  </div>
                  <button disabled style={{
                    background: '#333', color: '#666', border: '1px solid #444',
                    borderRadius: '8px', padding: '0.6rem 1.5rem', cursor: 'not-allowed',
                    fontWeight: 700, fontSize: '0.9rem', fontFamily: 'Roboto, sans-serif',
                  }}>
                    Request Credits
                  </button>
                </div>
              )}
              {lastAuditDate && (
                <div style={{fontSize:'0.75rem', color:'#555', marginTop:'0.75rem'}}>
                  Last run: {lastAuditDate} &bull; Auto: Sundays 3am
                </div>
              )}
            </>
          ) : (
            <>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.75rem'}}>
                <h3 style={{margin:0, fontSize:'1rem', color:'#EA9320'}}>Audit Running...</h3>
                <span style={{fontSize:'0.8rem', color:'#888'}}>Step {doneCount + (activeSection ? 1 : 0)} of {allSections.length}</span>
              </div>
              {/* Progress bar */}
              <div style={{background:'#252525', borderRadius:'4px', height:'6px', marginBottom:'1rem', overflow:'hidden'}}>
                <div style={{
                  background: 'linear-gradient(90deg, #EA9320, #f97316)',
                  height: '100%', borderRadius: '4px',
                  width: overallPct + '%', transition: 'width 0.5s ease',
                }} />
              </div>
              {/* Section checklist */}
              <div style={{display:'flex', flexDirection:'column', gap:'0.35rem'}}>
                {allSections.map(s => {
                  const state = sections.find(sec => sec.key === s.key);
                  const isDone = state?.status === 'done';
                  const isActive = state?.status === 'active';
                  return (
                    <div key={s.key} style={{
                      display:'flex', alignItems:'center', gap:'0.5rem', fontSize:'0.8rem',
                      color: isDone ? '#4ade80' : isActive ? '#EA9320' : '#555',
                    }}>
                      <span style={{fontSize:'0.75rem', width:'14px', textAlign:'center'}}>
                        {isDone ? '\u2713' : isActive ? '\u25CF' : '\u25CB'}
                      </span>
                      <span style={{flex:1}}>{s.label}</span>
                      {isActive && state?.step && <span style={{fontSize:'0.7rem', color:'#888'}}>{state.step}</span>}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }
