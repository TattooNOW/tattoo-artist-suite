<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TattooNOW Audit Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script>window.PropTypes = window.PropTypes || window.propTypes;</script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body, html { margin:0; padding:0; background:#0a0a0a; color:#fafafa; font-family:'Roboto',sans-serif; }
    h1,h2,h3,h4,h5 { font-family:'Roboto Slab',serif; }
    a { color:#EA9320; }
    .container { padding:20px; max-width:1200px; margin:0 auto; }
    table { width:100%; border-collapse:collapse; }
    table th { text-align:left; padding:8px 12px; border-bottom:2px solid #333; font-size:0.85rem; text-transform:uppercase; color:#888; letter-spacing:0.5px; }
    table td { padding:6px 12px; border-bottom:1px solid #222; }
    .card { background:#1a1a1a; padding:1.5rem; border-radius:8px; }
    .score-card { flex:1; background:#1a1a1a; padding:1.5rem; border-radius:8px; text-align:center; }
    .score-card h3 { margin:0 0 0.5rem 0; font-size:0.9rem; text-transform:uppercase; letter-spacing:1px; color:#888; }
    .score-card .value { font-size:2.5rem; font-weight:700; }
    .score-card .delta { font-size:1rem; margin-top:0.25rem; }
    .hero-metric { text-align:center; padding:2rem 1rem; margin-bottom:2rem; background:linear-gradient(135deg, #1a1a1a 0%, #111 100%); border-radius:12px; border:1px solid #333; }
    .hero-metric .hero-value { font-size:5rem; font-weight:700; line-height:1; }
    .hero-metric .hero-label { font-size:1.1rem; color:#888; margin-top:0.5rem; }
    .hero-metric .hero-sub { font-size:0.9rem; color:#666; margin-top:0.25rem; }
    .tab-bar { display:flex; gap:0; border-bottom:2px solid #333; margin-bottom:2rem; overflow-x:auto; }
    .tab-btn {
      padding:0.75rem 1.25rem; background:none; border:none; border-bottom:3px solid transparent;
      color:#888; font-family:'Roboto',sans-serif; font-size:0.9rem; font-weight:500;
      cursor:pointer; white-space:nowrap; transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color:#ccc; }
    .tab-btn.active { color:#EA9320; border-bottom-color:#EA9320; }
    .tab-btn .badge {
      display:inline-block; margin-left:0.5rem; padding:0.1rem 0.5rem; border-radius:10px;
      font-size:0.75rem; font-weight:700; background:#333; color:#aaa;
    }
    .tab-btn.active .badge { background:#EA9320; color:#000; }
    .grid-cell {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      font-size:0.7rem; font-weight:700; border-radius:4px; border:1px solid #333;
    }
    .pill { display:inline-block; padding:0.15rem 0.6rem; border-radius:10px; font-size:0.75rem; font-weight:600; }
    .progress-bar { background:#333; border-radius:4px; height:8px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
    select.filter { background:#1a1a1a; color:#fafafa; border:1px solid #333; padding:0.4rem 0.8rem; border-radius:4px; }
  </style>
</head>
<body>
  <div id="root">Loading...</div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const SUPABASE_URL = 'https://dwoqhaaugczqsymfirqu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YYTjG-yaVaj7bpfKyIJupw_ATKZvk0N';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Helpers ─────────────────────────────────────────── */
    const getDeltaArrow = v => v > 0 ? '\u25B2' : v < 0 ? '\u25BC' : '\u2014';
    const deltaColor = v => v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#666';
    const sevColor = s => ({ critical:'#ef4444', high:'#f87171', medium:'#fbbf24', low:'#60a5fa' }[s] || '#888');
    const rankColor = r => {
      if (r === null || r === undefined || r > 20) return '#333';
      if (r <= 3) return '#4ade80'; if (r <= 7) return '#a3e635';
      if (r <= 10) return '#fbbf24'; if (r <= 15) return '#f97316'; return '#f87171';
    };
    const rankBg = r => {
      if (r === null || r === undefined || r > 20) return '#1a1a1a';
      if (r <= 3) return 'rgba(74,222,128,0.15)'; if (r <= 7) return 'rgba(163,230,53,0.12)';
      if (r <= 10) return 'rgba(251,191,36,0.12)'; if (r <= 15) return 'rgba(249,115,22,0.12)'; return 'rgba(248,113,113,0.12)';
    };
    const statusIcon = s => s === 'listed' ? '\u2705' : (s === 'needs_fix' || s === 'needs_claim') ? '\u26A0\uFE0F' : '\u274C';
    const statusLabel = s => ({ listed:'Listed', needs_fix:'Needs Fix', needs_claim:'Needs Claim', not_listed:'Not Listed' }[s] || s);
    const statusRowBg = s => ({ listed:'rgba(74,222,128,0.08)', needs_fix:'rgba(251,191,36,0.08)', needs_claim:'rgba(251,191,36,0.08)', not_listed:'rgba(248,113,113,0.08)' }[s] || 'transparent');
    const priorityColor = p => ({ P0:'#ef4444', P1:'#fbbf24', P2:'#60a5fa' }[p] || '#888');

    /* ── Component: Run Audit Button ─────────────────────── */
    const AUDIT_WEBHOOK = 'https://tn.reinventingai.com/webhook/run-audit';

    function RunAuditButton({ locationId, lastAuditDate, showForm, defaults, onAuditStarted }) {
      const [status, setStatus] = React.useState('idle'); // idle | running | done | error
      const [domain, setDomain] = React.useState(defaults?.website || '');
      const [address, setAddress] = React.useState(defaults?.address || '');
      const [phone, setPhone] = React.useState(defaults?.phone || '');

      const runAudit = () => {
        if (!domain) return;
        setStatus('running');
        // Fire webhook in background — don't block the UI transition
        fetch(AUDIT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ locationId, domain, address, phone })
        }).then(res => console.log('Webhook response:', res.status, res.ok))
          .catch(e => console.error('Audit trigger failed:', e));
        // Immediately transition to processing screen
        if (onAuditStarted) onAuditStarted();
      };

      const inputStyle = { background:'#111', color:'#fafafa', border:'1px solid #333', padding:'0.5rem 0.75rem', borderRadius:'4px', width:'100%', fontSize:'0.9rem', fontFamily:'Roboto, sans-serif', boxSizing:'border-box' };

      /* Inline refresh button (non-CTA, used inside dashboard) */
      if (!showForm) {
        const btnStyles = {
          idle: { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' },
          running: { background:'#333', color:'#888', cursor:'wait', border:'1px solid #444' },
          done: { background:'#4ade80', color:'#000', cursor:'default', border:'none' },
        };
        const btnText = { idle:'Run Audit', running:'Sending...', done:'Audit Running...' };
        return (
          <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
            <h3 style={{marginTop:0, color:'#888'}}>Refresh Audit Data</h3>
            <button type="button" onClick={status !== 'running' && status !== 'done' ? runAudit : undefined}
              disabled={status === 'running' || status === 'done'}
              style={{ padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem', borderRadius:'6px', transition:'background 0.2s', ...btnStyles[status] }}>
              {btnText[status]}
            </button>
            <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>
              {lastAuditDate ? `Auto-runs every Sunday at 3am \u2022 Last run: ${lastAuditDate}` : 'Takes about 30 seconds'}
            </p>
          </section>
        );
      }

      /* Full CTA form */
      return (
        <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
          <h3 style={{marginTop:0, color:'#888'}}>Run Your First Audit</h3>
          <div style={{maxWidth:'400px', margin:'0 auto 1.5rem', textAlign:'left', display:'flex', flexDirection:'column', gap:'0.75rem'}}>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Website</label>
              <input value={domain} onChange={e => setDomain(e.target.value)} placeholder="example.com" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Address</label>
              <input value={address} onChange={e => setAddress(e.target.value)} placeholder="123 Main St, City, ST 00000" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Phone</label>
              <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="(555) 123-4567" style={inputStyle} />
            </div>
          </div>
          <button type="button" onClick={runAudit} disabled={!domain}
            style={{
              padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem',
              borderRadius:'6px', transition:'background 0.2s',
              ...(!domain ? { background:'#333', color:'#666', cursor:'not-allowed', border:'1px solid #444' }
                         : { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' })
            }}>
            Request Your Free Audit
          </button>
          <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>Takes about 30 seconds</p>
        </section>
      );
    }

    /* ── Component: Audit Processing Screen ───────────────── */
    function AuditProcessingScreen({ locationId }) {
      const [dots, setDots] = React.useState('');
      const [elapsed, setElapsed] = React.useState(0);
      const [found, setFound] = React.useState(false);
      const [liveStep, setLiveStep] = React.useState('starting');
      const [livePct, setLivePct] = React.useState(5);
      const [liveMsg, setLiveMsg] = React.useState('Starting audit...');

      const steps = [
        { key: 'starting',     label: 'Starting audit',              pct: 10 },
        { key: 'site_located', label: 'Site located',                pct: 20 },
        { key: 'crawling',     label: 'Crawling your website',       pct: 35 },
        { key: 'analyzing',    label: 'Analyzing HTML & content',    pct: 50 },
        { key: 'scoring',      label: 'Scoring SEO, AI & GEO signals', pct: 65 },
        { key: 'writing',      label: 'Writing audit report',        pct: 80 },
        { key: 'complete',     label: 'Audit complete!',             pct: 100 },
      ];

      // Animate dots
      React.useEffect(() => {
        const iv = setInterval(() => setDots(d => d.length >= 3 ? '' : d + '.'), 500);
        return () => clearInterval(iv);
      }, []);

      // Track elapsed time
      React.useEffect(() => {
        const iv = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(iv);
      }, []);

      // Subscribe to Supabase Realtime for progress updates from n8n
      React.useEffect(() => {
        if (!locationId) return;

        const channel = db.channel('audit-progress-' + locationId)
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'audit_progress',
            filter: 'location_id=eq.' + locationId,
          }, (payload) => {
            const row = payload.new;
            console.log('Progress update:', row);
            setLiveStep(row.step);
            setLivePct(row.pct);
            setLiveMsg(row.message || row.step);
            if (row.step === 'complete') {
              setFound(true);
              setTimeout(() => window.location.reload(), 2000);
            }
          })
          .subscribe((status) => {
            console.log('Realtime subscription:', status);
          });

        return () => { db.removeChannel(channel); };
      }, [locationId]);

      // Fallback: poll Supabase for audit results every 8 seconds in case Realtime misses
      React.useEffect(() => {
        if (!locationId || found) return;
        let canceled = false;

        const poll = async () => {
          try {
            const { data: siteData } = await db.from('sites').select('id').eq('ghl_location_id', locationId).maybeSingle();
            if (!siteData || canceled) return;
            const { data: audits } = await db.from('audits').select('id').eq('site_id', siteData.id).limit(1);
            if (canceled) return;
            if (audits && audits.length > 0) {
              setFound(true);
              setLiveStep('complete');
              setLivePct(100);
              setLiveMsg('Audit complete!');
              setTimeout(() => window.location.reload(), 2000);
            }
          } catch (e) { console.error('Poll error:', e); }
        };

        let pollIv = null;
        const start = setTimeout(() => {
          poll();
          pollIv = setInterval(poll, 8000);
        }, 15000);

        return () => { canceled = true; clearTimeout(start); if (pollIv) clearInterval(pollIv); };
      }, [locationId, found]);

      // Derive step statuses from live data
      const currentStepIdx = steps.findIndex(s => s.key === liveStep);
      const progress = found ? 100 : livePct;

      return (
        <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
          {/* Animated spinner */}
          <div style={{marginBottom:'2rem'}}>
            <div style={{
              width:'80px', height:'80px', margin:'0 auto',
              border:'4px solid #333', borderTop:'4px solid #EA9320',
              borderRadius:'50%',
              animation: found ? 'none' : 'spin 1s linear infinite',
              background: found ? '#4ade80' : 'transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.5s',
            }}>
              {found && <span style={{fontSize:'2rem'}}>&#x2714;</span>}
            </div>
          </div>

          <style dangerouslySetInnerHTML={{__html: `
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
          `}} />

          <h1 style={{margin:'0 0 0.5rem 0', color: found ? '#4ade80' : '#fafafa'}}>
            {found ? 'Audit Complete!' : 'Analyzing Your Site'}
          </h1>

          <p style={{color:'#EA9320', fontSize:'1.2rem', fontWeight:500, margin:'0 0 2rem 0', minHeight:'1.5em'}}>
            {found ? 'Loading your report...' : liveMsg + dots}
          </p>

          {/* Progress bar */}
          <div style={{maxWidth:'400px', margin:'0 auto 2rem'}}>
            <div className="progress-bar" style={{height:'10px', borderRadius:'5px'}}>
              <div className="progress-fill" style={{
                width: progress + '%',
                background: found ? '#4ade80' : 'linear-gradient(90deg, #EA9320, #f5c542)',
                transition:'width 1s ease-out',
              }} />
            </div>
            <p style={{color:'#666', fontSize:'0.8rem', marginTop:'0.5rem'}}>
              {found ? 'Done!' : `${progress}% \u2022 ${elapsed}s elapsed`}
            </p>
          </div>

          {/* Step checklist — driven by live n8n progress */}
          <div style={{textAlign:'left', maxWidth:'350px', margin:'0 auto'}}>
            {steps.map((s, i) => {
              const done = i < currentStepIdx || found;
              const active = i === currentStepIdx && !found;
              return (
                <div key={s.key} style={{
                  display:'flex', alignItems:'center', gap:'0.75rem',
                  padding:'0.4rem 0', color: done ? '#4ade80' : active ? '#EA9320' : '#555',
                  fontSize:'0.9rem', transition:'color 0.3s',
                }}>
                  <span style={{width:'20px', textAlign:'center', fontSize:'0.85rem'}}>
                    {done ? '\u2713' : active ? '\u25CF' : '\u25CB'}
                  </span>
                  <span style={{animation: active ? 'pulse 1.5s ease-in-out infinite' : 'none'}}>
                    {s.label}
                  </span>
                </div>
              );
            })}
          </div>

          {elapsed > 90 && !found && (
            <p style={{color:'#f87171', fontSize:'0.85rem', marginTop:'2rem'}}>
              Taking longer than expected... <a href="javascript:void(0)" onClick={() => window.location.reload()} style={{color:'#EA9320'}}>Reload manually</a>
            </p>
          )}

          <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
          </footer>
        </div>
      );
    }

    /* ── Tab: Overview ───────────────────────────────────── */
    function OverviewTab({ scores, delta, chartData, quickWins, rankMap, core30, homepageSections, apifyResults }) {
      const seo = scores.seo?.score ?? '\u2014';
      const ai = scores.ai_discoverability?.score ?? '\u2014';
      const geo = scores.geo_readiness?.score ?? '\u2014';
      const lh = apifyResults?.lighthouse || {};

      return (
        <div>
          {/* Hero: Rank Map Top-3% */}
          <div className="hero-metric" style={{borderColor: rankMap ? '#EA9320' : '#333'}}>
            {rankMap ? (
              <>
                <div className="hero-value" style={{color:'#EA9320'}}>{rankMap.top_3_pct}%</div>
                <div className="hero-label">Top-3 Pack Visibility</div>
                <div className="hero-sub">"{rankMap.keyword}" &bull; {rankMap.grid_size}pt grid &bull; {rankMap.scan_date}</div>
                <div className="hero-sub">Avg rank: {rankMap.avg_rank?.toFixed(1) || '\u2014'} &bull; Grid center rank: {rankMap.center_rank || '\u2014'}</div>
              </>
            ) : (
              <>
                <div className="hero-value" style={{color:'#333'}}>\u2014</div>
                <div className="hero-label">Rank Map Not Yet Imported</div>
                <div className="hero-sub">Run import-rankmap.js with a Local Falcon CSV</div>
              </>
            )}
          </div>

          {/* Overall + 3 Score Cards */}
          <section style={{display:'flex', gap:'1rem', marginBottom:'2rem', flexWrap:'wrap'}}>
            <div className="score-card" style={{borderTop:'3px solid #a78bfa'}}>
              <h3>Overall</h3>
              <div className="value" style={{color:'#a78bfa'}}>{scores.overall ?? '\u2014'}</div>
              <div className="delta" style={{color:deltaColor(delta.overall)}}>{getDeltaArrow(delta.overall)} {delta.overall != null ? (delta.overall>0?'+':'')+delta.overall+' pts':''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #4ade80'}}>
              <h3>SEO (L1)</h3>
              <div className="value" style={{color:'#4ade80'}}>{seo}</div>
              <div className="delta" style={{color:deltaColor(delta.seo)}}>{getDeltaArrow(delta.seo)} {delta.seo!=null?(delta.seo>0?'+':'')+delta.seo:''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #fbbf24'}}>
              <h3>AI (L2)</h3>
              <div className="value" style={{color:'#fbbf24'}}>{ai}</div>
              <div className="delta" style={{color:deltaColor(delta.ai_discoverability)}}>{getDeltaArrow(delta.ai_discoverability)} {delta.ai_discoverability!=null?(delta.ai_discoverability>0?'+':'')+delta.ai_discoverability:''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #f97316'}}>
              <h3>GEO (L3)</h3>
              <div className="value" style={{color:'#f97316'}}>{geo}</div>
              <div className="delta" style={{color:deltaColor(delta.geo_readiness)}}>{getDeltaArrow(delta.geo_readiness)} {delta.geo_readiness!=null?(delta.geo_readiness>0?'+':'')+delta.geo_readiness:''}</div>
            </div>
          </section>

          {/* Core 30 Coverage Bar */}
          {core30 && (
            <section className="card" style={{marginBottom:'2rem'}}>
              <h3 style={{marginTop:0}}>Core 30 Coverage</h3>
              <div style={{display:'flex', gap:'2rem', flexWrap:'wrap'}}>
                <div style={{flex:1, minWidth:'200px'}}>
                  <div style={{fontSize:'0.85rem', color:'#888', marginBottom:'0.5rem'}}>Categories ({core30.categories_found || 0}/{core30.categories_total || 0})</div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width: `${core30.categories_total ? Math.round((core30.categories_found||0)/(core30.categories_total)*100) : 0}%`, background:'#4ade80'}} />
                  </div>
                </div>
                <div style={{flex:1, minWidth:'200px'}}>
                  <div style={{fontSize:'0.85rem', color:'#888', marginBottom:'0.5rem'}}>Services ({core30.services_found || 0}/{core30.services_total || 0})</div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width: `${core30.services_total ? Math.round((core30.services_found||0)/(core30.services_total)*100) : 0}%`, background:'#60a5fa'}} />
                  </div>
                </div>
              </div>
              {(core30.categories_missing > 0 || core30.services_missing > 0) && (
                <div style={{marginTop:'0.75rem', fontSize:'0.85rem', color:'#f87171'}}>
                  {core30.categories_missing > 0 && `${core30.categories_missing} category page${core30.categories_missing>1?'s':''} missing`}
                  {core30.categories_missing > 0 && core30.services_missing > 0 && ' \u2022 '}
                  {core30.services_missing > 0 && `${core30.services_missing} service page${core30.services_missing>1?'s':''} missing`}
                </div>
              )}
            </section>
          )}

          {/* Homepage Coverage */}
          {homepageSections && (
            <section className="card" style={{marginBottom:'2rem'}}>
              <h3 style={{marginTop:0}}>Homepage Sections</h3>
              <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                <div className="progress-bar" style={{flex:1, height:'10px'}}>
                  <div className="progress-fill" style={{width: `${homepageSections.total ? Math.round(homepageSections.found/homepageSections.total*100) : 0}%`, background: homepageSections.critical_missing > 0 ? '#f87171' : homepageSections.missing > 0 ? '#fbbf24' : '#4ade80'}} />
                </div>
                <span style={{color:'#888', fontSize:'0.85rem', whiteSpace:'nowrap'}}>{homepageSections.found}/{homepageSections.total} sections</span>
              </div>
              {homepageSections.critical_missing > 0 && (
                <div style={{marginTop:'0.5rem', fontSize:'0.85rem', color:'#f87171'}}>
                  {homepageSections.critical_missing} critical section{homepageSections.critical_missing>1?'s':''} missing
                </div>
              )}
            </section>
          )}

          {/* Score Timeline */}
          <section style={{marginBottom:'2rem'}}>
            <h2>Score Timeline</h2>
            <Recharts.ResponsiveContainer width="100%" height={280}>
              <Recharts.LineChart data={chartData} margin={{top:5,right:20,left:10,bottom:5}}>
                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#333" />
                <Recharts.XAxis dataKey="date" stroke="#888" />
                <Recharts.YAxis domain={[0,100]} stroke="#888" />
                <Recharts.Tooltip contentStyle={{background:'#1a1a1a',border:'1px solid #333'}} />

    /* ── Tab: Homepage ──────────────────────────────────── */
    function HomepageTab({ homepageSections }) {
      if (!homepageSections || !homepageSections.sections) {
        return <p style={{color:'#888'}}>No homepage section analysis yet. Run a full audit first.</p>;
      }

      const { sections, total, found, missing, critical_missing } = homepageSections;
      const pct = total ? Math.round(found / total * 100) : 0;
      const importanceOrder = { critical: 0, high: 1, medium: 2, low: 3 };
      const sorted = [...sections].sort((a, b) => {
        const impDiff = (importanceOrder[a.importance] || 4) - (importanceOrder[b.importance] || 4);
        if (impDiff !== 0) return impDiff;
        return (a.found ? 1 : 0) - (b.found ? 1 : 0); // missing first within same importance
      });
      const impColor = imp => ({ critical: '#f87171', high: '#fb923c', medium: '#fbbf24', low: '#60a5fa' }[imp] || '#888');

      return (
        <div>
          <section style={{display:'flex', gap:'1rem', marginBottom:'2rem', flexWrap:'wrap'}}>
            <div className="score-card" style={{borderTop:'3px solid #4ade80'}}>
              <h3>Sections Found</h3>
              <div className="value">{found}<span style={{fontSize:'1rem', color:'#888'}}>/{total}</span></div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>{pct}% complete</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #f87171'}}>
              <h3>Missing</h3>
              <div className="value" style={{color:'#f87171'}}>{missing}</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>sections to add</div>
            </div>
            <div className="score-card" style={{borderTop: critical_missing > 0 ? '3px solid #ef4444' : '3px solid #4ade80'}}>
              <h3>Critical Missing</h3>
              <div className="value" style={{color: critical_missing > 0 ? '#ef4444' : '#4ade80'}}>{critical_missing}</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>{critical_missing > 0 ? 'needs attention' : 'all covered'}</div>
            </div>
          </section>

          <section className="card" style={{marginBottom:'2rem'}}>
            <h3 style={{marginTop:0}}>Homepage Coverage</h3>
            <div className="progress-bar" style={{height:'12px', marginBottom:'1rem'}}>
              <div className="progress-fill" style={{width: pct+'%', background: pct >= 80 ? '#4ade80' : pct >= 50 ? '#fbbf24' : '#f87171'}} />
            </div>
          </section>

          <table>
            <thead>
              <tr><th>Section</th><th>Status</th><th>Importance</th><th>Notes</th></tr>
            </thead>
            <tbody>
              {sorted.map((s, i) => (
                <tr key={i} style={{background: s.found ? 'rgba(74,222,128,0.06)' : 'rgba(248,113,113,0.08)'}}>
                  <td style={{fontWeight: 500}}>{s.name}</td>
                  <td>
                    <span className="pill" style={{background: s.found ? 'rgba(74,222,128,0.2)' : 'rgba(248,113,113,0.2)', color: s.found ? '#4ade80' : '#f87171'}}>
                      {s.found ? 'Found' : 'Missing'}
                    </span>
                  </td>
                  <td>
                    <span className="pill" style={{background: `${impColor(s.importance)}22`, color: impColor(s.importance)}}>
                      {s.importance}
                    </span>
                  </td>
                  <td style={{fontSize:'0.85rem', color: s.found ? '#9ca3af' : '#f9a8a8', maxWidth:'400px'}}>
                    {s.found ? (s.notes || '\u2713 Detected on page') : (s.recommendation || 'Section not detected')}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ── Tab: Findings ───────────────────────────────────── */
    function FindingsTab({ latestFindings }) {
      const [filterSev, setFilterSev] = React.useState('all');
      const [filterStat, setFilterStat] = React.useState('all');
      const [filterCat, setFilterCat] = React.useState('all');

      const categories = [...new Set(latestFindings.map(f => f.category))].sort();

      const filtered = latestFindings
        .filter(f => filterSev === 'all' || f.severity === filterSev)
        .filter(f => filterStat === 'all' || f.status === filterStat)
        .filter(f => filterCat === 'all' || f.category === filterCat)
        .sort((a,b) => {
          const o = {critical:0,high:1,medium:2,low:3};
          return (o[a.severity]||4)-(o[b.severity]||4);
        });

      return (
        <div>
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'1rem', flexWrap:'wrap'}}>
            <select className="filter" value={filterSev} onChange={e=>setFilterSev(e.target.value)}>
              <option value="all">All Severities</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select className="filter" value={filterStat} onChange={e=>setFilterStat(e.target.value)}>
              <option value="all">All Statuses</option>
              <option value="open">Open</option>
              <option value="fixed">Fixed</option>
              <option value="in_progress">In Progress</option>
            </select>
            <select className="filter" value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
              <option value="all">All Categories</option>
              {categories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <span style={{color:'#888', alignSelf:'center', fontSize:'0.85rem'}}>{filtered.length} finding{filtered.length!==1?'s':''}</span>
          </div>
          <table>
            <thead><tr><th>Sev</th><th>Title</th><th>Category</th><th>Layer</th><th>Page</th><th>Status</th><th>Effort</th><th>Age</th></tr></thead>
            <tbody>
            {filtered.map(f => {
              const age = Math.floor((new Date() - new Date(f.still_open_since || f.first_detected || f.created_at)) / 86400000);
              return (
                <tr key={f.id} title={f.fix} style={{background: f.status==='fixed'?'rgba(74,222,128,0.06)':f.status==='in_progress'?'rgba(251,191,36,0.08)':'rgba(248,113,113,0.08)'}}>
                  <td><span className="pill" style={{background:`${sevColor(f.severity)}22`, color:sevColor(f.severity)}}>{f.severity}</span></td>
                  <td style={{fontWeight:500}}>{f.title}</td>
                  <td style={{color:'#888'}}>{f.category}</td>
                  <td style={{color:'#888'}}>{f.layer != null ? `L${f.layer}` : '\u2014'}</td>
                  <td style={{fontFamily:'monospace', fontSize:'0.8rem'}}>{f.page || '\u2014'}</td>
                  <td>{f.status}</td>
                  <td>{f.effort_minutes ? f.effort_minutes+'m' : '\u2014'}</td>
                  <td style={{color:'#888'}}>{age}d</td>
                </tr>
              );
            })}
            </tbody>
          </table>
        </div>
      );
    }

    /* ── Tab: GEO Signals ────────────────────────────────── */
    function GeoTab({ latestGeo }) {
      if (latestGeo.length === 0) return <p style={{color:'#888'}}>No GEO/AEO signals recorded. Run a full audit to populate.</p>;
      const passing = latestGeo.filter(g => g.signal_value).length;
      const failing = latestGeo.length - passing;
      const pct = Math.round((passing/latestGeo.length)*100);

      // Group signals by type
      const groupMap = {
        local_business_schema: 'Schema & Structured Data',
        faq_schema: 'Schema & Structured Data',
        city_in_title: 'On-Page Local Signals',
        city_in_h1: 'On-Page Local Signals',
        og_tags_present: 'On-Page Local Signals',
        phone_on_homepage: 'NAP & Contact',
        address_on_homepage: 'NAP & Contact',
        gbp_embed: 'NAP & Contact',
      };
      const groupOrder = ['Schema & Structured Data', 'On-Page Local Signals', 'NAP & Contact'];
      const groupColors = {
        'Schema & Structured Data': '#a78bfa',
        'On-Page Local Signals': '#fbbf24',
        'NAP & Contact': '#60a5fa',
      };

      const grouped = {};
      latestGeo.forEach(g => {
        const group = groupMap[g.signal_name] || 'Other';
        if (!grouped[group]) grouped[group] = [];
        grouped[group].push(g);
      });

      const sortedGroups = groupOrder.filter(g => grouped[g]).concat(
        Object.keys(grouped).filter(g => !groupOrder.includes(g))
      );

      return (
        <div>
          <section style={{display:'flex', gap:'1rem', marginBottom:'2rem', flexWrap:'wrap'}}>
            <div className="score-card" style={{borderTop:'3px solid #f97316'}}>
              <h3>GEO Score</h3>
              <div className="value" style={{color:'#f97316'}}>{pct}</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>{passing}/{latestGeo.length} passing</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #4ade80'}}>
              <h3>Passing</h3>
              <div className="value" style={{color:'#4ade80'}}>{passing}</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>signals detected</div>
            </div>
            <div className="score-card" style={{borderTop: failing > 0 ? '3px solid #f87171' : '3px solid #4ade80'}}>
              <h3>Needs Work</h3>
              <div className="value" style={{color: failing > 0 ? '#f87171' : '#4ade80'}}>{failing}</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>{failing > 0 ? 'signals missing' : 'all clear'}</div>
            </div>
          </section>

          {sortedGroups.map(groupName => {
            const signals = grouped[groupName];
            const groupPass = signals.filter(g => g.signal_value).length;
            const gc = groupColors[groupName] || '#888';

            return (
              <section key={groupName} className="card" style={{marginBottom:'1.5rem', border:'1px solid #222'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
                  <h3 style={{margin:0, color: gc}}>{groupName}</h3>
                  <span style={{color:'#888', fontSize:'0.85rem'}}>{groupPass}/{signals.length} passing</span>

                <div style={{display:'flex', flexDirection:'column', gap:'0.75rem'}}>
                  {signals.map(g => (
                    <div key={g.id} style={{background:'#111', padding:'1rem', borderRadius:'6px', borderLeft: g.signal_value ? '3px solid #4ade80':'3px solid #f87171'}}>

                        <span className="pill" style={{background: g.signal_value ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)', color: g.signal_value ? '#4ade80' : '#f87171', flexShrink:0}}>
                          {g.signal_value ? '\u2713 Found' : '\u2717 Missing'}
                        </span>
                      </div>
                      {g.details && (
                        <div style={{marginTop:'0.5rem', padding:'0.5rem 0.75rem', background:'#0a0a0a', borderRadius:'4px', fontFamily:'monospace', fontSize:'0.8rem', color: g.signal_value ? '#9ca3af' : '#fca5a5', wordBreak:'break-word'}}>
                          {g.details}
                        </div>
                      )}
                      {g.recommendation && (
                        <div style={{marginTop:'0.5rem', fontSize:'0.85rem', color:'#d1d5db', lineHeight:'1.4'}}>
                          <span style={{color:'#fbbf24', fontWeight:600, marginRight:'0.35rem'}}>Fix:</span>{g.recommendation}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </section>
            );
          })}
        </div>
      );
    }

    /* ── Tab: AI Mentions ────────────────────────────────── */
    function AITab({ aiMentions, businessName }) {
      if (aiMentions.length === 0) return <p style={{color:'#888'}}>AI probes not yet run. Layer 2 data will appear after AI probes execute.</p>;

      const total = aiMentions.length;
      const mentioned = aiMentions.filter(m => m.mentioned).length;
      const aiPct = total > 0 ? Math.round(mentioned / total * 100) : 0;
      const probeDate = aiMentions[0]?.probe_date || aiMentions[0]?.created_at?.split('T')[0] || '';
      const probeTime = aiMentions[0]?.created_at ? new Date(aiMentions[0].created_at).toLocaleTimeString() : '';

      // Engine breakdown
      const engines = [...new Set(aiMentions.map(m => m.engine))];
      const byEngine = engines.map(e => {
        const probes = aiMentions.filter(m => m.engine === e);
        return { engine: e, total: probes.length, mentioned: probes.filter(m => m.mentioned).length };
      });

      // Collect all competitors mentioned across probes
      const allCompetitors = {};
      aiMentions.forEach(m => {
        if (m.competitors && Array.isArray(m.competitors)) {
          m.competitors.forEach(c => { allCompetitors[c] = (allCompetitors[c] || 0) + 1; });
        }
      });
      const competitorList = Object.entries(allCompetitors).sort((a,b) => b[1] - a[1]);

      return (
        <div>
          <section style={{display:'flex', gap:'1rem', marginBottom:'1.5rem', flexWrap:'wrap', alignItems:'flex-start'}}>
            <div className="score-card" style={{borderTop:`3px solid ${aiPct >= 60 ? '#4ade80' : aiPct >= 30 ? '#fbbf24' : '#f87171'}`}}>
              <h3>AI Score</h3>
              <div className="value" style={{color: aiPct >= 60 ? '#4ade80' : aiPct >= 30 ? '#fbbf24' : '#f87171'}}>{aiPct}%</div>
              <div style={{color:'#888', fontSize:'0.85rem'}}>{mentioned}/{total} probes</div>
            </div>
            {byEngine.map(e => (
              <div key={e.engine} className="score-card" style={{borderTop:'3px solid #555'}}>
                <h3 style={{textTransform:'capitalize'}}>{e.engine}</h3>
                <div className="value">{e.mentioned}<span style={{fontSize:'1rem', color:'#888'}}>/{e.total}</span></div>
                <div style={{color:'#888', fontSize:'0.85rem'}}>{Math.round(e.mentioned/e.total*100)}% found</div>
              </div>
            ))}
          </section>

          {probeDate && <p style={{color:'#666', fontSize:'0.8rem', marginBottom:'1rem'}}>Probed: {probeDate}{probeTime ? ` at ${probeTime}` : ''}</p>}

          <table>
            <thead><tr><th>Engine</th><th>Query</th><th>Mentioned?</th><th>NAP</th><th>Sentiment</th><th>AI Results (ranked)</th></tr></thead>
            <tbody>
              {aiMentions.map(m => {
                const clip = m.mentioned ? m.mention_text : (m.raw_response ? m.raw_response.substring(0, 200) : null);
                return (
                  <React.Fragment key={m.id}>
                    <tr style={{background: m.mentioned?'rgba(74,222,128,0.06)':'rgba(248,113,113,0.08)', borderBottom: clip ? 'none' : undefined}}>
                      <td style={{textTransform:'capitalize'}}>{m.engine}</td>
                      <td>{m.query}</td>
                      <td style={{color: m.mentioned?'#4ade80':'#f87171'}}>{m.mentioned?'Yes':'No'}</td>
                      <td style={{color: m.nap_accurate?'#4ade80':m.nap_accurate===false?'#f87171':'#888'}}>{m.nap_accurate==null?'\u2014':m.nap_accurate?'Yes':'No'}</td>
                      <td>{m.sentiment||'\u2014'}</td>
                      <td style={{fontSize:'0.8rem', maxWidth:'300px'}}>
                        {m.competitors && m.competitors.length > 0 ? m.competitors.map((c, ci) => {
                          const nameLower = (businessName || '').toLowerCase();
                          const cLower = c.toLowerCase();
                          const isSelf = nameLower && (cLower.includes(nameLower.split(' ')[0]) || nameLower.includes(cLower.split(' ')[0]));
                          return <span key={ci}>{ci > 0 && ', '}<span style={{color: isSelf ? '#4ade80' : '#aaa', fontWeight: isSelf ? 700 : 400}}>{ci+1}. {c}</span></span>;
                        }) : '\u2014'}
                      </td>
                    </tr>
                    {clip && (
                      <tr style={{background: m.mentioned?'rgba(74,222,128,0.03)':'rgba(248,113,113,0.04)'}}>
                        <td colSpan={6} style={{fontSize:'0.75rem', color:'#777', padding:'0.25rem 1rem 0.6rem 1rem', borderTop:'none', fontStyle:'italic'}}>
                          {clip}{clip.length >= 200 ? '...' : ''}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>

          {competitorList.length > 0 && (
            <section className="card" style={{marginTop:'1.5rem'}}>
              <h3 style={{marginTop:0}}>Competitors Appearing in AI Results</h3>
              <div style={{display:'flex', gap:'0.5rem', flexWrap:'wrap'}}>
                {competitorList.map(([name, count]) => (
                  <span key={name} className="pill" style={{background:'rgba(248,113,113,0.15)', color:'#f9a8a8'}}>
                    {name} ({count}x)
                  </span>
                ))}
              </div>
            </section>
          )}
        </div>
      );
    }

    /* ── Tab: Link Checklist ─────────────────────────────── */

                <tr key={l.id} style={{background: l.status==='done'?'rgba(74,222,128,0.06)':'rgba(248,113,113,0.08)'}}>
                  <td><span className="pill" style={{background:l.priority<=2?'rgba(239,68,68,0.2)':l.priority<=5?'rgba(251,191,36,0.2)':'rgba(96,165,250,0.2)', color:l.priority<=2?'#f87171':l.priority<=5?'#fbbf24':'#60a5fa'}}>P{l.priority}</span></td>
                  <td style={{textTransform:'capitalize'}}>{(l.link_type||'').replace(/_/g,' ')}</td>

                  <td>{l.estimated_cost || 'Free'}</td>
                  <td style={{textTransform:'capitalize'}}>{l.status || 'pending'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ── Tab: Competitors ────────────────────────────────── */
    function CompetitorsTab({ competitors, site, aiMentions }) {
      if (!competitors || competitors.length === 0) return <p style={{color:'#888'}}>No competitor data yet. Run the AI prober and competitor intelligence scraper to populate.</p>;

      // Parse notes JSON and separate client vs competitors
      const all = competitors.map(c => {
        let intel = {};
        try { intel = c.notes ? JSON.parse(c.notes) : {}; } catch(e) { intel = {}; }
        return { ...c, intel };
      });
      const clientRow = all.find(c => c.intel.is_client);
      const compRows = all.filter(c => !c.intel.is_client && c.intel.source === 'ai_probes').sort((a, b) => {
        const am = a.intel.ai_mentions || 0, bm = b.intel.ai_mentions || 0;
        if (bm !== am) return bm - am;
        return (b.intel.above_client || 0) - (a.intel.above_client || 0);
      });

      const aboveCount = compRows.filter(c => (c.intel.above_client || 0) > 0).length;
      const fmt = n => n ? n.toLocaleString() : '\u2014';

      // Helper: render social cell for a row
      const SocialCell = ({intel}) => {
        const ig = intel.instagram, fb = intel.facebook, tt = intel.tiktok;
        if (!ig && !fb && !tt) return <span style={{color:'#555'}}>none found</span>;
        return <React.Fragment>
          {ig && <div><span style={{color:'#E1306C'}}>IG</span> <a href={'https://instagram.com/'+ig} target="_blank" rel="noopener" style={{color:'#aaa'}}>@{ig}</a>{intel.instagram_followers ? <span style={{color:'#888'}}> {fmt(intel.instagram_followers)}</span> : ''}{intel.instagram_posts ? <span style={{color:'#666'}}> / {fmt(intel.instagram_posts)} posts</span> : ''}</div>}
          {fb && <div><span style={{color:'#4267B2'}}>FB</span> <a href={'https://facebook.com/'+fb} target="_blank" rel="noopener" style={{color:'#aaa'}}>{fb}</a>{intel.facebook_followers ? <span style={{color:'#888'}}> {fmt(intel.facebook_followers)}</span> : ''}{intel.facebook_likes ? <span style={{color:'#666'}}> / {fmt(intel.facebook_likes)} likes</span> : ''}</div>}
          {tt && <div><span style={{color:'#69C9D0'}}>TT</span> <a href={'https://tiktok.com/@'+tt} target="_blank" rel="noopener" style={{color:'#aaa'}}>@{tt}</a>{intel.tiktok_followers ? <span style={{color:'#888'}}> {fmt(intel.tiktok_followers)}</span> : ''}</div>}
        </React.Fragment>;
      };

      // Helper: render review cell (Google + Yelp)
      const ReviewCell = ({intel, review_rating, review_count}) => {
        const gr = intel.google_rating || review_rating;
        const gc = intel.google_reviews || review_count;
        const yr = intel.yelp_rating;
        const yc = intel.yelp_reviews;
        if (!gr && !yr) return <span style={{color:'#555'}}>{'\u2014'}</span>;
        return <React.Fragment>
          {gr ? <div><span style={{color:'#4285f4'}}>G</span> <span style={{color:'#fbbf24'}}>{gr}</span><span style={{color:'#888', fontSize:'0.8rem'}}> ({gc || '?'})</span></div> : null}
          {yr ? <div><span style={{color:'#d32323'}}>Y</span> <span style={{color:'#fbbf24'}}>{yr}</span><span style={{color:'#888', fontSize:'0.8rem'}}> ({yc || '?'})</span></div> : null}
        </React.Fragment>;
      };

      return (
        <div>
          <h3>Competitive Intelligence — {site.target_city || site.city}</h3>
          <p style={{color:'#888', fontSize:'0.85rem', marginBottom:'1rem'}}>
            {compRows.length} competitors found across AI probes. <span style={{color:'#f87171'}}>{aboveCount} rank above you</span> in AI results.
          </p>

          <table>
            <thead><tr>
              <th>#</th>
              <th>Business</th>
              <th>Website</th>
              <th>Social Media</th>
              <th>Reviews</th>
              <th>AI Mentions</th>
              <th>Ranks Above</th>
            </tr></thead>
            <tbody>
              {/* Client row first, highlighted */}
              {clientRow && (
                <tr style={{background:'rgba(234,147,32,0.12)', borderLeft:'3px solid #EA9320'}}>
                  <td style={{color:'#EA9320', fontWeight:700, fontSize:'0.9rem'}}>{'\u2605'}</td>
                  <td style={{fontWeight:700, color:'#EA9320'}}>{clientRow.competitor_name}<div style={{fontSize:'0.7rem',color:'#888'}}>YOUR BUSINESS</div></td>
                  <td>{clientRow.domain ? <a href={'https://'+clientRow.domain} target="_blank" rel="noopener" style={{color:'#EA9320', fontSize:'0.85rem'}}>{clientRow.domain}</a> : '\u2014'}</td>
                  <td style={{fontSize:'0.8rem'}}><SocialCell intel={clientRow.intel} /></td>
                  <td style={{fontSize:'0.8rem'}}><ReviewCell intel={clientRow.intel} review_rating={clientRow.review_rating} review_count={clientRow.review_count} /></td>
                  <td style={{textAlign:'center'}}>{'\u2014'}</td>
                  <td style={{textAlign:'center'}}>{'\u2014'}</td>
                </tr>
              )}
              {compRows.map((c, idx) => {
                const above = c.intel.above_client || 0;
                const mentions = c.intel.ai_mentions || 0;
                const bgColor = above > 0 ? 'rgba(248,113,113,0.08)' : 'rgba(74,222,128,0.04)';
                return (
                  <tr key={c.id} style={{background: bgColor}}>
                    <td style={{color:'#888', fontSize:'0.8rem'}}>{idx + 1}</td>
                    <td style={{fontWeight:500}}>{c.competitor_name}</td>
                    <td>{c.domain ? <a href={'https://'+c.domain} target="_blank" rel="noopener" style={{color:'#EA9320', fontSize:'0.85rem'}}>{c.domain}</a> : <span style={{color:'#555'}}>not found</span>}</td>
                    <td style={{fontSize:'0.8rem'}}><SocialCell intel={c.intel} /></td>
                    <td style={{fontSize:'0.8rem'}}><ReviewCell intel={c.intel} review_rating={c.review_rating} review_count={c.review_count} /></td>
                    <td style={{textAlign:'center'}}><span className="pill" style={{background:'rgba(234,147,32,0.15)', color:'#EA9320'}}>{mentions}x</span></td>
                    <td style={{textAlign:'center'}}>{above > 0 ? <span className="pill" style={{background:'rgba(248,113,113,0.2)', color:'#f87171'}}>{above}x</span> : <span style={{color:'#4ade80', fontSize:'0.85rem'}}>below</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <p style={{fontSize:'0.8rem', color:'#666', marginTop:'1rem'}}>
            Social stats via Apify. Reviews: <span style={{color:'#4285f4'}}>G</span>=Google, <span style={{color:'#d32323'}}>Y</span>=Yelp. Red rows = ranks above you in AI responses.
          </p>
        </div>
      );
    }

      };

      const filtered = listings.filter(l => filterStatus==='all'||l.status===filterStatus).filter(l => filterTier==='all'||l.tier===parseInt(filterTier));

                    <span style={{color:'#fbbf24', marginLeft:'0.4rem'}}>{l.nap_issues.map(i => napIssueLabels[i] || i).join(', ')}</span>
                    {l.nap_priority && <span style={{marginLeft:'0.4rem', fontSize:'0.7rem', padding:'1px 5px', borderRadius:'3px', background: l.nap_priority === 'P0' ? '#ef4444' : l.nap_priority === 'P1' ? '#f59e0b' : '#6b7280', color:'#fff'}}>{l.nap_priority}</span>}

                ))}

            </div>
          )}
          <div style={{display:'flex', gap:'0.75rem', marginBottom:'1rem'}}>
            <select className="filter" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All Statuses</option>
              <option value="listed">Listed</option>
              <option value="needs_fix">Needs Fix</option>
              <option value="needs_claim">Needs Claim</option>
              <option value="not_listed">Not Listed</option>
            </select>
            <select className="filter" value={filterTier} onChange={e=>setFilterTier(e.target.value)}>
              <option value="all">All Tiers</option>
              {[1,2,3,4,5].map(t => <option key={t} value={t}>Tier {t}: {tierNames[t]}</option>)}
            </select>
          </div>
          <table>
            <thead><tr><th>Status</th><th>Platform</th><th>Tier</th><th>NAP</th><th>Claimed</th><th>Cost</th><th>Link</th></tr></thead>
            <tbody>
              {filtered.sort((a,b)=>a.tier-b.tier||a.platform.localeCompare(b.platform)).map(l => {
                const claimUrl = getSubmitUrl(l);
                const hasNapIssues = l.nap_issues && l.nap_issues.length > 0;
                const napStatus = (l.status === 'not_listed') ? null : hasNapIssues ? false : true;
                return (
                  <tr key={l.id} style={{background:statusRowBg(l.status)}}>
                    <td>{statusIcon(l.status)} {statusLabel(l.status)}</td>
                    <td style={{fontWeight:500}}>{l.platform.replace(/_/g,' ')}</td>
                    <td style={{color:'#888'}}>{tierNames[l.tier]||l.tier}</td>
                    <td style={{textAlign:'center'}}>{napStatus == null ? <span style={{color:'#555'}}>{'\u2014'}</span> : napStatus ? <span style={{color:'#4ade80'}} title="NAP matches">{'\u2713'}</span> : <span style={{color:'#fbbf24'}} title={l.nap_issues.map(i=>napIssueLabels[i]||i).join(', ')}>{'\u26A0'}</span>}</td>
                    <td>{l.is_claimed==null?'\u2014':l.is_claimed?'\u2713':'\u2717'}</td>
                    <td>{l.cost_tier||'FREE'}</td>
                    <td>
                      {l.listing_url && <a href={l.listing_url} target="_blank" rel="noopener" style={{color:'#4ade80', marginRight: claimUrl ? '0.5rem' : 0}}>View</a>}
                      {claimUrl && (l.status !== 'listed') && <a href={claimUrl} target="_blank" rel="noopener" style={{color:'#EA9320'}}>{l.status === 'needs_claim' ? 'Claim' : l.status === 'not_listed' ? 'Register' : 'Update'}</a>}
                      {!l.listing_url && !(claimUrl && l.status !== 'listed') && '\u2014'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    /* ── Settings Panel ──────────────────────────────────── */
    function SettingsPanel({ site, open, onClose, billingRecords, locationId, lastAuditDate, onAuditStarted }) {
      const [saving, setSaving] = React.useState(false);
      const [saved, setSaved] = React.useState(false);
      const [auditStatus, setAuditStatus] = React.useState('idle');
      const social = site.social_links || {};
      const [form, setForm] = React.useState({
        domain: site.domain || '',
        phone: site.phone || '',
        address: site.address || '',
        city: site.target_city || site.city || '',
        state: site.target_state || site.state || '',
        ig: social.instagram || '',
        fb: social.facebook || '',
        tt: social.tiktok || '',
        google_url: social.google_url || '',
        yelp_url: social.yelp_url || '',
      });

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const save = async () => {
        setSaving(true);
        try {
          await db.from('sites').update({
            domain: form.domain,
            phone: form.phone,
            address: form.address,
            target_city: form.city,
            target_state: form.state,
            social_links: {
              instagram: form.ig, facebook: form.fb, tiktok: form.tt,
              google_url: form.google_url, yelp_url: form.yelp_url,
            },
          }).eq('id', site.id);
          setSaved(true);
          setTimeout(() => setSaved(false), 2000);
        } catch (e) { console.error(e); }
        setSaving(false);
      };

      const runAudit = () => {
        if (!form.domain) return;
        setAuditStatus('running');
        fetch(AUDIT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ locationId, domain: form.domain, address: form.address + ', ' + form.city + ', ' + form.state, phone: form.phone })
        }).then(res => console.log('Webhook response:', res.status))
          .catch(e => console.error('Audit trigger failed:', e));
        if (onAuditStarted) onAuditStarted();
      };

      if (!open) return null;

      const totalAudits = billingRecords.length;
      const totalCharged = billingRecords.reduce((s, b) => s + Number(b.charge_amount || 0), 0);
      const totalCost = billingRecords.reduce((s, b) => s + Number(b.total_cost || 0), 0);

      const inputStyle = { background:'#111', color:'#fafafa', border:'1px solid #333', padding:'0.4rem 0.6rem', borderRadius:'4px', width:'100%', fontFamily:'Roboto, sans-serif', fontSize:'0.85rem', boxSizing:'border-box' };
      const labelStyle = { color:'#888', fontSize:'0.75rem', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'0.25rem', display:'block' };

      return (
        <div style={{position:'fixed', top:0, right:0, width:'360px', height:'100vh', background:'#111', borderLeft:'1px solid #333', zIndex:1000, overflowY:'auto', padding:'1.5rem', boxShadow:'-4px 0 20px rgba(0,0,0,0.5)'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.5rem'}}>
            <h3 style={{margin:0}}>Site Settings</h3>
            <button onClick={onClose} style={{background:'none', border:'none', color:'#888', fontSize:'1.2rem', cursor:'pointer'}}>&times;</button>
          </div>

          {/* ── Audit Reports & Billing ─────────────────── */}
          <div style={{background:'#0a0a0a', border:'1px solid #333', borderRadius:'8px', padding:'1rem', marginBottom:'1.5rem'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.75rem'}}>
              <div>
                <div style={{fontSize:'0.7rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Reports Used</div>
                <div style={{fontSize:'1.8rem', fontWeight:700, color:'#fafafa'}}>{totalAudits}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:'0.7rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Total Charged</div>
                <div style={{fontSize:'1.8rem', fontWeight:700, color:'#4ade80'}}>${totalCharged.toFixed(2)}</div>
              </div>
            </div>
            <div style={{fontSize:'0.75rem', color:'#555', borderTop:'1px solid #222', paddingTop:'0.5rem'}}>
              {lastAuditDate ? `Last run: ${lastAuditDate}` : 'No audits yet'} &bull; $2.00/report
            </div>
          </div>

          {/* ── Run Audit ──────────────────────────────── */}
          <button onClick={auditStatus !== 'running' ? runAudit : undefined}
            disabled={auditStatus === 'running' || !form.domain}
            style={{
              width:'100%', padding:'0.65rem', marginBottom:'1.5rem',
              background: auditStatus === 'running' ? '#333' : '#EA9320',
              color: auditStatus === 'running' ? '#888' : '#000',
              border:'none', borderRadius:'6px', fontWeight:700, cursor: auditStatus === 'running' ? 'wait' : 'pointer',
              fontSize:'0.9rem', fontFamily:'Roboto Slab, serif',
            }}>
            {auditStatus === 'running' ? 'Audit Running...' : 'Run Audit'}
          </button>

          {/* ── Business Info ──────────────────────────── */}
          <h4 style={{color:'#EA9320', margin:'0 0 0.75rem 0', fontSize:'0.85rem', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Info</h4>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Domain</label>
            <input style={inputStyle} value={form.domain} onChange={e => set('domain', e.target.value)} />
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Phone</label>
            <input style={inputStyle} value={form.phone} onChange={e => set('phone', e.target.value)} />
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Address</label>
            <input style={inputStyle} value={form.address} onChange={e => set('address', e.target.value)} />
          </div>
          <div style={{display:'flex', gap:'0.5rem', marginBottom:'1.5rem'}}>
            <div style={{flex:2}}>
              <label style={labelStyle}>City</label>
              <input style={inputStyle} value={form.city} onChange={e => set('city', e.target.value)} />
            </div>
            <div style={{flex:1}}>
              <label style={labelStyle}>State</label>
              <input style={inputStyle} value={form.state} onChange={e => set('state', e.target.value)} />
            </div>
          </div>

          <h4 style={{color:'#EA9320', margin:'0 0 0.75rem 0', fontSize:'0.85rem', textTransform:'uppercase', letterSpacing:'0.5px'}}>Social Profiles</h4>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Instagram Handle</label>
            <input style={inputStyle} placeholder="username" value={form.ig} onChange={e => set('ig', e.target.value)} />
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Facebook Page</label>
            <input style={inputStyle} placeholder="pagename" value={form.fb} onChange={e => set('fb', e.target.value)} />
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>TikTok Handle</label>
            <input style={inputStyle} placeholder="username" value={form.tt} onChange={e => set('tt', e.target.value)} />
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={labelStyle}>Google Business URL</label>
            <input style={inputStyle} placeholder="https://maps.google.com/..." value={form.google_url} onChange={e => set('google_url', e.target.value)} />
          </div>
          <div style={{marginBottom:'1.5rem'}}>
            <label style={labelStyle}>Yelp Business URL</label>
            <input style={inputStyle} placeholder="https://yelp.com/biz/..." value={form.yelp_url} onChange={e => set('yelp_url', e.target.value)} />
          </div>

          <button onClick={save} disabled={saving} style={{
            width:'100%', padding:'0.6rem', background: saved ? '#4ade80' : '#EA9320', color: saved ? '#000' : '#000',
            border:'none', borderRadius:'4px', fontWeight:600, cursor: saving ? 'wait' : 'pointer', fontSize:'0.9rem',
          }}>
            {saving ? 'Saving...' : saved ? 'Saved!' : 'Save Settings'}
          </button>
        </div>
      );
    }

    /* ── Main App ────────────────────────────────────────── */
    function App() {
      const params = new URLSearchParams(window.location.search);
      const locationId = params.get('locationId');
      // GHL merge fields: address, city, state, postalCode are separate fields
      // Build full address from parts: {{location.address}}, {{location.city}}, {{location.state}} {{location.postalCode}}
      const addrParts = [
        params.get('address'),
        [params.get('city'), params.get('state')].filter(Boolean).join(', '),
        params.get('postalCode')
      ].filter(Boolean).join(', ');
      const urlDefaults = {
        website: params.get('website') || '',
        address: addrParts,
        phone: params.get('phone') || '',
      };

      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [site, setSite] = React.useState(null);
      const [audits, setAudits] = React.useState([]);
      const [findings, setFindings] = React.useState([]);
      const [geoSignals, setGeoSignals] = React.useState([]);
      const [aiMentions, setAiMentions] = React.useState([]);
      const [directoryListings, setDirectoryListings] = React.useState([]);
      const [rankMaps, setRankMaps] = React.useState([]);
      const [competitors, setCompetitors] = React.useState([]);
      const [linkChecklist, setLinkChecklist] = React.useState([]);
      const [billingRecords, setBillingRecords] = React.useState([]);
      const [activeTab, setActiveTab] = React.useState('overview');
      const [auditRunning, setAuditRunning] = React.useState(false);
      const [settingsOpen, setSettingsOpen] = React.useState(false);

      // Check if an audit is currently in progress (progress rows exist but not complete)
      React.useEffect(() => {
        if (!locationId || auditRunning) return;
        (async () => {
          try {
            const { data } = await db.from('audit_progress')
              .select('step,pct')
              .eq('location_id', locationId)
              .order('created_at', { ascending: false })
              .limit(1);
            if (data && data.length > 0 && data[0].step !== 'complete') {
              setAuditRunning(true);
            }
          } catch (e) { /* ignore */ }
        })();
      }, [locationId]);

      React.useEffect(() => {
        if (!locationId) { setLoading(false); return; }
        let canceled = false;

        (async () => {
          try {
            const { data: siteData, error: siteErr } = await db.from('sites').select('*').eq('ghl_location_id', locationId).maybeSingle();
            if (siteErr) throw siteErr;
            if (canceled) return;
            if (!siteData) { setLoading(false); return; }
            setSite(siteData);

            // Fetch all tables in parallel — gracefully handle missing tables
            const queries = [
              db.from('audits').select('*').eq('site_id', siteData.id).order('audit_date', {ascending:true}),
              db.from('findings').select('*').eq('site_id', siteData.id),
              db.from('geo_signals').select('*').eq('site_id', siteData.id),
              db.from('ai_mentions').select('*').eq('site_id', siteData.id),
              db.from('rank_maps').select('*').eq('site_id', siteData.id).order('scan_date', {ascending:false}),
              db.from('competitors').select('*').eq('site_id', siteData.id).order('created_at', {ascending:false}),
              db.from('link_checklist').select('*').eq('site_id', siteData.id).order('priority', {ascending:true}),
              db.from('directory_listings').select('*').eq('site_id', siteData.id),
              db.from('audit_billing').select('*').eq('site_id', siteData.id).order('audit_date', {ascending:false}),
            ];

            const results = await Promise.allSettled(queries);
            if (canceled) return;

            const safe = (r) => r.status === 'fulfilled' && !r.value.error ? r.value.data || [] : [];
            setAudits(safe(results[0]));
            setFindings(safe(results[1]));
            setGeoSignals(safe(results[2]));
            setAiMentions(safe(results[3]));
            setRankMaps(safe(results[4]));
            setCompetitors(safe(results[5]));
            setLinkChecklist(safe(results[6]));
            setDirectoryListings(safe(results[7]));
            setBillingRecords(safe(results[8]));
          } catch (e) {
            console.error('Dashboard load error:', e);
            if (!canceled) setError(e);
            return;
          } finally {
            if (!canceled) setLoading(false);
          }
        })();

        return () => { canceled = true; };
      }, [locationId]);

      if (!locationId) return <div className="container"><h2>Missing location parameter</h2><p>Add ?locationId=YOUR_GHL_LOCATION_ID to the URL</p></div>;
      if (loading) return <div className="container" style={{textAlign:'center',paddingTop:'4rem'}}><h2>Loading dashboard...</h2></div>;

      /* ── Empty / No-Data State — friendly CTA ─────────── */
      if (error || !site || audits.length === 0) {
        if (auditRunning) {
          return <AuditProcessingScreen locationId={locationId} />;
        }
        return (
          <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
            <div style={{fontSize:'4rem', marginBottom:'1rem'}}>&#x1F50D;</div>
            <h1 style={{margin:'0 0 0.5rem 0'}}>SEO & GEO Audit Dashboard</h1>
            <p style={{color:'#888', fontSize:'1.1rem', margin:'0 0 2rem 0'}}>
              {site ? site.business_name : 'Your business'} doesn't have an audit report yet.
            </p>
            <RunAuditButton locationId={locationId} lastAuditDate={null} showForm={true} defaults={urlDefaults} onAuditStarted={() => setAuditRunning(true)} />
            <p style={{color:'#555', fontSize:'0.85rem', marginTop:'1.5rem'}}>
              We'll analyze your site across SEO, AI discoverability, GEO signals, directory listings, and more.
            </p>
            <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
              Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
            </footer>
          </div>
        );
      }

      const latest = audits[audits.length - 1];
      const scores = latest.scores || {};
      const delta = latest.delta || {};
      const core30 = latest.core30_coverage || null;
      const contentBriefs = latest.content_briefs || [];
      const homepageSections = latest.homepage_sections || null;

      const chartData = audits.map(a => ({
        date: a.audit_date,
        Overall: a.scores?.overall ?? 0,
        SEO: a.scores?.seo?.score ?? 0,
        AI: a.scores?.ai_discoverability?.score ?? 0,
        GEO: a.scores?.geo_readiness?.score ?? 0,
      }));

      const latestFindings = findings.filter(f => f.audit_id === latest.id);
      const latestGeo = geoSignals.filter(g => g.audit_id === latest.id);
      const quickWins = latestFindings.filter(f => f.effort_minutes <= 15 && f.impact === 'high' && f.status === 'open');
      const latestRankMap = rankMaps.length > 0 ? rankMaps[0] : null;

      // Compute AI score from ai_mentions data (overrides stored null)
      const aiScoreFromMentions = aiMentions.length > 0
        ? Math.round(aiMentions.filter(m => m.mentioned).length / aiMentions.length * 100)
        : null;
      if (aiScoreFromMentions !== null) {
        if (!scores.ai_discoverability) scores.ai_discoverability = {};
        scores.ai_discoverability.score = aiScoreFromMentions;
        // Recalculate overall with AI data: SEO 40% + AI 15% + GEO 45%
        const seoScore = scores.seo?.score || 0;
        const geoScore = scores.geo_readiness?.score || 0;
        scores.overall = Math.round(seoScore * 0.4 + aiScoreFromMentions * 0.15 + geoScore * 0.45);
      }

      const openFindings = latestFindings.filter(f => f.status === 'open').length;
      const dirNeedsAtt = directoryListings.filter(l => l.status !== 'listed').length;
      const pendingLinks = linkChecklist.filter(l => l.status !== 'done').length;
      const missingPages = (core30?.categories_missing||0) + (core30?.services_missing||0);

      const hpMissing = homepageSections?.missing || 0;

      const tabs = [
        { id:'overview', label:'Overview' },
        { id:'homepage', label:'Homepage', badge: hpMissing > 0 ? hpMissing : null },
        { id:'rankmap', label:'Rank Map', badge: latestRankMap ? latestRankMap.top_3_pct+'%' : null },
        { id:'core30', label:'Core 30', badge: missingPages > 0 ? missingPages : null },
        { id:'findings', label:'Findings', badge: openFindings || null },
        { id:'geo', label:'GEO' },
        { id:'ai', label:'AI' },
        { id:'links', label:'Link Checklist', badge: pendingLinks || null },
        { id:'directories', label:'Directories', badge: dirNeedsAtt || null },
        { id:'competitors', label:'Competitors' },
      ];

      return (
        <div className="container">
          <header style={{marginBottom:'1.5rem', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <h1 style={{margin:'0 0 0.25rem 0'}}>{site.business_name}</h1>
              <p style={{margin:0, color:'#888'}}>{site.domain} &bull; {site.target_city||site.city}, {site.target_state||site.state} &bull; Last audit: {latest.audit_date}</p>
            </div>
            <button onClick={() => setSettingsOpen(!settingsOpen)} style={{
              background: settingsOpen ? '#EA9320' : 'none', border:'1px solid ' + (settingsOpen ? '#EA9320' : '#333'),
              borderRadius:'6px', padding:'0.5rem 1rem',
              color: settingsOpen ? '#000' : '#888', cursor:'pointer', fontSize:'0.85rem', fontWeight:600,
              fontFamily:'Roboto, sans-serif', marginTop:'0.25rem', transition:'all 0.2s',
            }}>{settingsOpen ? 'Close' : 'Settings'}</button>
          </header>
          <SettingsPanel site={site} open={settingsOpen} onClose={() => setSettingsOpen(false)} billingRecords={billingRecords} locationId={locationId} lastAuditDate={latest.audit_date} onAuditStarted={() => setAuditRunning(true)} />

          <nav className="tab-bar">
            {tabs.map(t => (
              <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>
                {t.label}
                {t.badge != null && <span className="badge">{t.badge}</span>}
              </button>
            ))}
          </nav>

          {activeTab === 'overview' && <OverviewTab scores={scores} delta={delta} chartData={chartData} quickWins={quickWins} rankMap={latestRankMap} core30={core30} homepageSections={homepageSections} apifyResults={latest.apify_results || {}} />}
          {activeTab === 'homepage' && <HomepageTab homepageSections={homepageSections} />}
          {activeTab === 'rankmap' && <RankMapTab rankMaps={rankMaps} />}
          {activeTab === 'core30' && <Core30Tab core30={core30} contentBriefs={contentBriefs} />}
          {activeTab === 'findings' && <FindingsTab latestFindings={latestFindings} />}
          {activeTab === 'geo' && <GeoTab latestGeo={latestGeo} />}
          {activeTab === 'ai' && <AITab aiMentions={aiMentions} businessName={site.business_name} />}
          {activeTab === 'links' && <LinkChecklistTab links={linkChecklist} />}
          {activeTab === 'directories' && <DirectoryTab listings={directoryListings} site={site} />}
          {activeTab === 'competitors' && <CompetitorsTab competitors={competitors} site={site} aiMentions={aiMentions} />}

          <footer style={{marginTop:'2rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a> &bull; Site Audit System v3.0
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
