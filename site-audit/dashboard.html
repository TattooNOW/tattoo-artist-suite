<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TattooNOW Audit Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script>window.PropTypes = window.PropTypes || window.propTypes;</script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body, html { margin:0; padding:0; background:#0a0a0a; color:#fafafa; font-family:'Roboto',sans-serif; }
    h1,h2,h3,h4,h5 { font-family:'Roboto Slab',serif; }
    a { color:#EA9320; }
    .container { padding:20px; max-width:1200px; margin:0 auto; }
    table { width:100%; border-collapse:collapse; }
    table th { text-align:left; padding:8px 12px; border-bottom:2px solid #333; font-size:0.85rem; text-transform:uppercase; color:#888; letter-spacing:0.5px; }
    table td { padding:6px 12px; border-bottom:1px solid #222; }
    .card { background:#1a1a1a; padding:1.5rem; border-radius:8px; }
    .score-card { flex:1; background:#1a1a1a; padding:1.5rem; border-radius:8px; text-align:center; }
    .score-card h3 { margin:0 0 0.5rem 0; font-size:0.9rem; text-transform:uppercase; letter-spacing:1px; color:#888; }
    .score-card .value { font-size:2.5rem; font-weight:700; }
    .score-card .delta { font-size:1rem; margin-top:0.25rem; }
    .hero-metric { text-align:center; padding:2rem 1rem; margin-bottom:2rem; background:linear-gradient(135deg, #1a1a1a 0%, #111 100%); border-radius:12px; border:1px solid #333; }
    .hero-metric .hero-value { font-size:5rem; font-weight:700; line-height:1; }
    .hero-metric .hero-label { font-size:1.1rem; color:#888; margin-top:0.5rem; }
    .hero-metric .hero-sub { font-size:0.9rem; color:#666; margin-top:0.25rem; }
    .tab-bar { display:flex; gap:0; border-bottom:2px solid #333; margin-bottom:2rem; overflow-x:auto; }
    .tab-btn {
      padding:0.75rem 1.25rem; background:none; border:none; border-bottom:3px solid transparent;
      color:#888; font-family:'Roboto',sans-serif; font-size:0.9rem; font-weight:500;
      cursor:pointer; white-space:nowrap; transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color:#ccc; }
    .tab-btn.active { color:#EA9320; border-bottom-color:#EA9320; }
    .tab-btn .badge {
      display:inline-block; margin-left:0.5rem; padding:0.1rem 0.5rem; border-radius:10px;
      font-size:0.75rem; font-weight:700; background:#333; color:#aaa;
    }
    .tab-btn.active .badge { background:#EA9320; color:#000; }
    .grid-cell {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      font-size:0.7rem; font-weight:700; border-radius:4px; border:1px solid #333;
    }
    .pill { display:inline-block; padding:0.15rem 0.6rem; border-radius:10px; font-size:0.75rem; font-weight:600; }
    .progress-bar { background:#333; border-radius:4px; height:8px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
    select.filter { background:#1a1a1a; color:#fafafa; border:1px solid #333; padding:0.4rem 0.8rem; border-radius:4px; }
  </style>
</head>
<body>
  <div id="root">Loading...</div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const SUPABASE_URL = 'https://dwoqhaaugczqsymfirqu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YYTjG-yaVaj7bpfKyIJupw_ATKZvk0N';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Helpers ─────────────────────────────────────────── */
    const getDeltaArrow = v => v > 0 ? '\u25B2' : v < 0 ? '\u25BC' : '\u2014';
    const deltaColor = v => v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#666';
    const sevColor = s => ({ critical:'#ef4444', high:'#f87171', medium:'#fbbf24', low:'#60a5fa' }[s] || '#888');
    const rankColor = r => {
      if (r === null || r === undefined || r > 20) return '#333';
      if (r <= 3) return '#4ade80'; if (r <= 7) return '#a3e635';
      if (r <= 10) return '#fbbf24'; if (r <= 15) return '#f97316'; return '#f87171';
    };
    const rankBg = r => {
      if (r === null || r === undefined || r > 20) return '#1a1a1a';
      if (r <= 3) return 'rgba(74,222,128,0.15)'; if (r <= 7) return 'rgba(163,230,53,0.12)';
      if (r <= 10) return 'rgba(251,191,36,0.12)'; if (r <= 15) return 'rgba(249,115,22,0.12)'; return 'rgba(248,113,113,0.12)';
    };
    const statusIcon = s => s === 'listed' ? '\u2705' : (s === 'needs_fix' || s === 'needs_claim') ? '\u26A0\uFE0F' : '\u274C';
    const statusLabel = s => ({ listed:'Listed', needs_fix:'Needs Fix', needs_claim:'Needs Claim', not_listed:'Not Listed' }[s] || s);
    const statusRowBg = s => ({ listed:'rgba(74,222,128,0.08)', needs_fix:'rgba(251,191,36,0.08)', needs_claim:'rgba(251,191,36,0.08)', not_listed:'rgba(248,113,113,0.08)' }[s] || 'transparent');
    const priorityColor = p => ({ P0:'#ef4444', P1:'#fbbf24', P2:'#60a5fa' }[p] || '#888');

    /* ── Component: Run Audit Button ─────────────────────── */
    const AUDIT_WEBHOOK = 'https://tn.reinventingai.com/webhook/run-audit';

    function RunAuditButton({ locationId, lastAuditDate, showForm, defaults, onAuditStarted }) {
      const [status, setStatus] = React.useState('idle'); // idle | running | done | error
      const [domain, setDomain] = React.useState(defaults?.website || '');
      const [address, setAddress] = React.useState(defaults?.address || '');
      const [phone, setPhone] = React.useState(defaults?.phone || '');

      const runAudit = async () => {
        if (!domain) return;
        setStatus('running');
        if (onAuditStarted) onAuditStarted();
        try {
          const res = await fetch(AUDIT_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ locationId, domain, address, phone })
          });
          console.log('Webhook response:', res.status, res.ok);
          setStatus('done');
        } catch (e) {
          console.error('Audit trigger failed:', e);
          setStatus('done');
        }
      };

      const inputStyle = { background:'#111', color:'#fafafa', border:'1px solid #333', padding:'0.5rem 0.75rem', borderRadius:'4px', width:'100%', fontSize:'0.9rem', fontFamily:'Roboto, sans-serif', boxSizing:'border-box' };

      /* Inline refresh button (non-CTA, used inside dashboard) */
      if (!showForm) {
        const btnStyles = {
          idle: { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' },
          running: { background:'#333', color:'#888', cursor:'wait', border:'1px solid #444' },
          done: { background:'#4ade80', color:'#000', cursor:'default', border:'none' },
        };
        const btnText = { idle:'Run Audit', running:'Sending...', done:'Audit Running...' };
        return (
          <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
            <h3 style={{marginTop:0, color:'#888'}}>Refresh Audit Data</h3>
            <button type="button" onClick={status !== 'running' && status !== 'done' ? runAudit : undefined}
              disabled={status === 'running' || status === 'done'}
              style={{ padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem', borderRadius:'6px', transition:'background 0.2s', ...btnStyles[status] }}>
              {btnText[status]}
            </button>
            <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>
              {lastAuditDate ? `Auto-runs every Sunday at 3am \u2022 Last run: ${lastAuditDate}` : 'Takes about 30 seconds'}
            </p>
          </section>
        );
      }

      /* Full CTA form */
      return (
        <section className="card" style={{marginBottom:'2rem', border:'1px solid #333', textAlign:'center', padding:'2rem'}}>
          <h3 style={{marginTop:0, color:'#888'}}>Run Your First Audit</h3>
          <div style={{maxWidth:'400px', margin:'0 auto 1.5rem', textAlign:'left', display:'flex', flexDirection:'column', gap:'0.75rem'}}>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Website</label>
              <input value={domain} onChange={e => setDomain(e.target.value)} placeholder="example.com" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Address</label>
              <input value={address} onChange={e => setAddress(e.target.value)} placeholder="123 Main St, City, ST 00000" style={inputStyle} />
            </div>
            <div>
              <label style={{fontSize:'0.75rem', color:'#888', textTransform:'uppercase', letterSpacing:'0.5px'}}>Business Phone</label>
              <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="(555) 123-4567" style={inputStyle} />
            </div>
          </div>
          <button type="button" onClick={runAudit} disabled={!domain}
            style={{
              padding:'0.75rem 2rem', fontFamily:'Roboto Slab, serif', fontWeight:700, fontSize:'1rem',
              borderRadius:'6px', transition:'background 0.2s',
              ...(!domain ? { background:'#333', color:'#666', cursor:'not-allowed', border:'1px solid #444' }
                         : { background:'#EA9320', color:'#000', cursor:'pointer', border:'none' })
            }}>
            Request Your Free Audit
          </button>
          <p style={{color:'#555', fontSize:'0.8rem', marginTop:'0.75rem', marginBottom:0}}>Takes about 30 seconds</p>
        </section>
      );
    }

    /* ── Component: Audit Processing Screen ───────────────── */
    function AuditProcessingScreen({ locationId }) {
      const [dots, setDots] = React.useState('');
      const [elapsed, setElapsed] = React.useState(0);
      const [found, setFound] = React.useState(false);

      const steps = [
        { label: 'Crawling your website', time: 5 },
        { label: 'Analyzing HTML & content', time: 12 },
        { label: 'Scoring SEO signals', time: 18 },
        { label: 'Checking AI discoverability', time: 22 },
        { label: 'Evaluating GEO readiness', time: 26 },
        { label: 'Generating your report', time: 30 },
      ];

      // Animate dots
      React.useEffect(() => {
        const iv = setInterval(() => setDots(d => d.length >= 3 ? '' : d + '.'), 500);
        return () => clearInterval(iv);
      }, []);

      // Track elapsed time
      React.useEffect(() => {
        const iv = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(iv);
      }, []);

      // Poll Supabase for audit results every 5 seconds
      React.useEffect(() => {
        if (!locationId) return;
        let canceled = false;

        const poll = async () => {
          try {
            const { data: siteData } = await db.from('sites').select('id').eq('ghl_location_id', locationId).maybeSingle();
            if (!siteData || canceled) return;
            const { data: audits } = await db.from('audits').select('id').eq('site_id', siteData.id).limit(1);
            if (canceled) return;
            if (audits && audits.length > 0) {
              setFound(true);
              setTimeout(() => window.location.reload(), 1500);
            }
          } catch (e) {
            console.error('Poll error:', e);
          }
        };

        // Start polling after 8 seconds, then every 5 seconds
        let pollIv = null;
        const start = setTimeout(() => {
          poll();
          pollIv = setInterval(poll, 5000);
        }, 8000);

        return () => { canceled = true; clearTimeout(start); if (pollIv) clearInterval(pollIv); };
      }, [locationId]);

      const currentStep = steps.reduce((acc, s) => elapsed >= s.time ? s : acc, steps[0]);
      const progress = Math.min((elapsed / 35) * 100, found ? 100 : 95);

      return (
        <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
          {/* Animated spinner */}
          <div style={{marginBottom:'2rem'}}>
            <div style={{
              width:'80px', height:'80px', margin:'0 auto',
              border:'4px solid #333', borderTop:'4px solid #EA9320',
              borderRadius:'50%',
              animation: found ? 'none' : 'spin 1s linear infinite',
              background: found ? '#4ade80' : 'transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.5s',
            }}>
              {found && <span style={{fontSize:'2rem'}}>&#x2714;</span>}
            </div>
          </div>

          <style dangerouslySetInnerHTML={{__html: `
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
          `}} />

          <h1 style={{margin:'0 0 0.5rem 0', color: found ? '#4ade80' : '#fafafa'}}>
            {found ? 'Audit Complete!' : 'Analyzing Your Site'}
          </h1>

          <p style={{color:'#EA9320', fontSize:'1.2rem', fontWeight:500, margin:'0 0 2rem 0', minHeight:'1.5em'}}>
            {found ? 'Loading your report...' : currentStep.label + dots}
          </p>

          {/* Progress bar */}
          <div style={{maxWidth:'400px', margin:'0 auto 2rem'}}>
            <div className="progress-bar" style={{height:'10px', borderRadius:'5px'}}>
              <div className="progress-fill" style={{
                width: progress + '%',
                background: found ? '#4ade80' : 'linear-gradient(90deg, #EA9320, #f5c542)',
                transition:'width 1s ease-out',
              }} />
            </div>
            <p style={{color:'#666', fontSize:'0.8rem', marginTop:'0.5rem'}}>
              {found ? 'Done!' : `${Math.round(progress)}% \u2022 ${elapsed}s elapsed`}
            </p>
          </div>

          {/* Step checklist */}
          <div style={{textAlign:'left', maxWidth:'350px', margin:'0 auto'}}>
            {steps.map((s, i) => {
              const done = elapsed >= s.time;
              const active = currentStep === s && !done;
              return (
                <div key={i} style={{
                  display:'flex', alignItems:'center', gap:'0.75rem',
                  padding:'0.4rem 0', color: done ? '#4ade80' : active ? '#EA9320' : '#555',
                  fontSize:'0.9rem',
                }}>
                  <span style={{width:'20px', textAlign:'center'}}>
                    {done ? '\u2713' : active ? '\u25CB' : '\u25CB'}
                  </span>
                  <span style={{animation: active ? 'pulse 1.5s ease-in-out infinite' : 'none'}}>
                    {s.label}
                  </span>
                </div>
              );
            })}
          </div>

          {elapsed > 60 && !found && (
            <p style={{color:'#f87171', fontSize:'0.85rem', marginTop:'2rem'}}>
              Taking longer than expected... <a href="javascript:void(0)" onClick={() => window.location.reload()} style={{color:'#EA9320'}}>Reload manually</a>
            </p>
          )}

          <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
          </footer>
        </div>
      );
    }

    /* ── Tab: Overview ───────────────────────────────────── */
    function OverviewTab({ scores, delta, chartData, quickWins, rankMap, core30, lastAuditDate, locationId, siteDomain }) {
      const seo = scores.seo?.score ?? '\u2014';
      const ai = scores.ai_discoverability?.score ?? '\u2014';
      const geo = scores.geo_readiness?.score ?? '\u2014';

      return (
        <div>
          {/* Hero: Rank Map Top-3% */}
          <div className="hero-metric" style={{borderColor: rankMap ? '#EA9320' : '#333'}}>
            {rankMap ? (
              <>
                <div className="hero-value" style={{color:'#EA9320'}}>{rankMap.top_3_pct}%</div>
                <div className="hero-label">Top-3 Pack Visibility</div>
                <div className="hero-sub">"{rankMap.keyword}" &bull; {rankMap.grid_size}pt grid &bull; {rankMap.scan_date}</div>
                <div className="hero-sub">Avg rank: {rankMap.avg_rank?.toFixed(1) || '\u2014'} &bull; Grid center rank: {rankMap.center_rank || '\u2014'}</div>
              </>
            ) : (
              <>
                <div className="hero-value" style={{color:'#333'}}>\u2014</div>
                <div className="hero-label">Rank Map Not Yet Imported</div>
                <div className="hero-sub">Run import-rankmap.js with a Local Falcon CSV</div>
              </>
            )}
          </div>

          {/* Overall + 3 Score Cards */}
          <section style={{display:'flex', gap:'1rem', marginBottom:'2rem', flexWrap:'wrap'}}>
            <div className="score-card" style={{borderTop:'3px solid #a78bfa'}}>
              <h3>Overall</h3>
              <div className="value" style={{color:'#a78bfa'}}>{scores.overall ?? '\u2014'}</div>
              <div className="delta" style={{color:deltaColor(delta.overall)}}>{getDeltaArrow(delta.overall)} {delta.overall != null ? (delta.overall>0?'+':'')+delta.overall+' pts':''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #4ade80'}}>
              <h3>SEO (L1)</h3>
              <div className="value" style={{color:'#4ade80'}}>{seo}</div>
              <div className="delta" style={{color:deltaColor(delta.seo)}}>{getDeltaArrow(delta.seo)} {delta.seo!=null?(delta.seo>0?'+':'')+delta.seo:''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #fbbf24'}}>
              <h3>AI (L2)</h3>
              <div className="value" style={{color:'#fbbf24'}}>{ai}</div>
              <div className="delta" style={{color:deltaColor(delta.ai_discoverability)}}>{getDeltaArrow(delta.ai_discoverability)} {delta.ai_discoverability!=null?(delta.ai_discoverability>0?'+':'')+delta.ai_discoverability:''}</div>
            </div>
            <div className="score-card" style={{borderTop:'3px solid #f97316'}}>
              <h3>GEO (L3)</h3>
              <div className="value" style={{color:'#f97316'}}>{geo}</div>
              <div className="delta" style={{color:deltaColor(delta.geo_readiness)}}>{getDeltaArrow(delta.geo_readiness)} {delta.geo_readiness!=null?(delta.geo_readiness>0?'+':'')+delta.geo_readiness:''}</div>
            </div>
          </section>

          {/* Core 30 Coverage Bar */}
          {core30 && (
            <section className="card" style={{marginBottom:'2rem'}}>
              <h3 style={{marginTop:0}}>Core 30 Coverage</h3>
              <div style={{display:'flex', gap:'2rem', flexWrap:'wrap'}}>
                <div style={{flex:1, minWidth:'200px'}}>
                  <div style={{fontSize:'0.85rem', color:'#888', marginBottom:'0.5rem'}}>Categories ({core30.categories_found || 0}/{core30.categories_total || 0})</div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width: `${core30.categories_total ? Math.round((core30.categories_found||0)/(core30.categories_total)*100) : 0}%`, background:'#4ade80'}} />
                  </div>
                </div>
                <div style={{flex:1, minWidth:'200px'}}>
                  <div style={{fontSize:'0.85rem', color:'#888', marginBottom:'0.5rem'}}>Services ({core30.services_found || 0}/{core30.services_total || 0})</div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width: `${core30.services_total ? Math.round((core30.services_found||0)/(core30.services_total)*100) : 0}%`, background:'#60a5fa'}} />
                  </div>
                </div>
              </div>
              {(core30.categories_missing > 0 || core30.services_missing > 0) && (
                <div style={{marginTop:'0.75rem', fontSize:'0.85rem', color:'#f87171'}}>
                  {core30.categories_missing > 0 && `${core30.categories_missing} category page${core30.categories_missing>1?'s':''} missing`}
                  {core30.categories_missing > 0 && core30.services_missing > 0 && ' \u2022 '}
                  {core30.services_missing > 0 && `${core30.services_missing} service page${core30.services_missing>1?'s':''} missing`}
                </div>
              )}
            </section>
          )}

          {/* Score Timeline */}
          <section style={{marginBottom:'2rem'}}>
            <h2>Score Timeline</h2>
            <Recharts.ResponsiveContainer width="100%" height={280}>
              <Recharts.LineChart data={chartData} margin={{top:5,right:20,left:10,bottom:5}}>
                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#333" />
                <Recharts.XAxis dataKey="date" stroke="#888" />
                <Recharts.YAxis domain={[0,100]} stroke="#888" />
                <Recharts.Tooltip contentStyle={{background:'#1a1a1a',border:'1px solid #333'}} />
                <Recharts.Legend />
                <Recharts.Line type="monotone" dataKey="Overall" stroke="#a78bfa" strokeWidth={2} dot={{r:3}} />
                <Recharts.Line type="monotone" dataKey="SEO" stroke="#4ade80" strokeWidth={2} dot={{r:3}} />
                <Recharts.Line type="monotone" dataKey="AI" stroke="#fbbf24" strokeWidth={2} dot={{r:3}} />
                <Recharts.Line type="monotone" dataKey="GEO" stroke="#f97316" strokeWidth={2} dot={{r:3}} />
              </Recharts.LineChart>
            </Recharts.ResponsiveContainer>
          </section>

          {/* Quick Wins */}
          {quickWins.length > 0 && (
            <section className="card" style={{marginBottom:'2rem', border:'1px solid #333'}}>
              <h2 style={{marginTop:0}}>Quick Wins ({quickWins.length})</h2>
              <p style={{color:'#888', marginTop:0}}>High-impact fixes under 15 minutes</p>
              {quickWins.map(f => (
                <div key={f.id} style={{marginBottom:'1rem', paddingBottom:'1rem', borderBottom:'1px solid #222'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <strong style={{color:sevColor(f.severity)}}>[{f.severity.toUpperCase()}] {f.title}</strong>
                    <span style={{color:'#888', fontSize:'0.85rem'}}>{f.effort_minutes} min</span>
                  </div>
                  <div style={{color:'#aaa', fontSize:'0.9rem', marginTop:'0.25rem'}}>{f.fix}</div>
                </div>
              ))}
            </section>
          )}

          {/* GBP Health Card */}
          <section className="card" style={{marginBottom:'2rem', border:'1px solid #333'}}>
            <h3 style={{marginTop:0}}>GBP Health</h3>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px,1fr))', gap:'1rem'}}>
              <div>
                <div style={{color:'#888', fontSize:'0.8rem'}}>Reviews</div>
                <div style={{fontSize:'1.5rem', fontWeight:700}}>{scores.seo?.breakdown?.gbp_reviews ?? '\u2014'}</div>
              </div>
              <div>
                <div style={{color:'#888', fontSize:'0.8rem'}}>Rating</div>
                <div style={{fontSize:'1.5rem', fontWeight:700}}>{scores.seo?.breakdown?.gbp_rating ?? '\u2014'}</div>
              </div>
              <div>
                <div style={{color:'#888', fontSize:'0.8rem'}}>Map Embed</div>

    /* ── Main App ────────────────────────────────────────── */
    function App() {
      const params = new URLSearchParams(window.location.search);
      const locationId = params.get('locationId');
      // GHL merge fields: address, city, state, postalCode are separate fields
      // Build full address from parts: {{location.address}}, {{location.city}}, {{location.state}} {{location.postalCode}}
      const addrParts = [
        params.get('address'),
        [params.get('city'), params.get('state')].filter(Boolean).join(', '),
        params.get('postalCode')
      ].filter(Boolean).join(', ');
      const urlDefaults = {
        website: params.get('website') || '',
        address: addrParts,
        phone: params.get('phone') || '',
      };

      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [site, setSite] = React.useState(null);
      const [audits, setAudits] = React.useState([]);
      const [findings, setFindings] = React.useState([]);
      const [geoSignals, setGeoSignals] = React.useState([]);
      const [aiMentions, setAiMentions] = React.useState([]);
      const [directoryListings, setDirectoryListings] = React.useState([]);
      const [rankMaps, setRankMaps] = React.useState([]);
      const [competitors, setCompetitors] = React.useState([]);
      const [linkChecklist, setLinkChecklist] = React.useState([]);
      const [activeTab, setActiveTab] = React.useState('overview');
      const [auditRunning, setAuditRunning] = React.useState(false);

      React.useEffect(() => {
        if (!locationId) { setLoading(false); return; }
        let canceled = false;

        (async () => {
          try {
            const { data: siteData, error: siteErr } = await db.from('sites').select('*').eq('ghl_location_id', locationId).maybeSingle();
            if (siteErr) throw siteErr;
            if (canceled) return;
            if (!siteData) { setLoading(false); return; }
            setSite(siteData);

            // Fetch all tables in parallel — gracefully handle missing tables
            const queries = [
              db.from('audits').select('*').eq('site_id', siteData.id).order('audit_date', {ascending:true}),
              db.from('findings').select('*').eq('site_id', siteData.id),
              db.from('geo_signals').select('*').eq('site_id', siteData.id),
              db.from('ai_mentions').select('*').eq('site_id', siteData.id),
              db.from('rank_maps').select('*').eq('site_id', siteData.id).order('scan_date', {ascending:false}),
              db.from('competitors').select('*').eq('site_id', siteData.id).order('review_count', {ascending:false}),
              db.from('link_checklist').select('*').eq('site_id', siteData.id).order('priority', {ascending:true}),
              db.from('directory_listings').select('*').eq('site_id', siteData.id),
            ];

            const results = await Promise.allSettled(queries);
            if (canceled) return;

            const safe = (r) => r.status === 'fulfilled' && !r.value.error ? r.value.data || [] : [];
            setAudits(safe(results[0]));
            setFindings(safe(results[1]));
            setGeoSignals(safe(results[2]));
            setAiMentions(safe(results[3]));
            setRankMaps(safe(results[4]));
            setCompetitors(safe(results[5]));
            setLinkChecklist(safe(results[6]));
            setDirectoryListings(safe(results[7]));
          } catch (e) {
            console.error('Dashboard load error:', e);
            if (!canceled) setError(e);
            return;
          } finally {
            if (!canceled) setLoading(false);
          }
        })();

        return () => { canceled = true; };
      }, [locationId]);

      if (!locationId) return <div className="container"><h2>Missing location parameter</h2><p>Add ?locationId=YOUR_GHL_LOCATION_ID to the URL</p></div>;
      if (loading) return <div className="container" style={{textAlign:'center',paddingTop:'4rem'}}><h2>Loading dashboard...</h2></div>;

      /* ── Empty / No-Data State — friendly CTA ─────────── */
      if (error || !site || audits.length === 0) {
        if (auditRunning) {
          return <AuditProcessingScreen locationId={locationId} />;
        }
        return (
          <div className="container" style={{textAlign:'center', paddingTop:'4rem', maxWidth:'600px'}}>
            <div style={{fontSize:'4rem', marginBottom:'1rem'}}>&#x1F50D;</div>
            <h1 style={{margin:'0 0 0.5rem 0'}}>SEO & GEO Audit Dashboard</h1>
            <p style={{color:'#888', fontSize:'1.1rem', margin:'0 0 2rem 0'}}>
              {site ? site.business_name : 'Your business'} doesn't have an audit report yet.
            </p>
            <RunAuditButton locationId={locationId} lastAuditDate={null} showForm={true} defaults={urlDefaults} onAuditStarted={() => setAuditRunning(true)} />
            <p style={{color:'#555', fontSize:'0.85rem', marginTop:'1.5rem'}}>
              We'll analyze your site across SEO, AI discoverability, GEO signals, directory listings, and more.
            </p>
            <footer style={{marginTop:'3rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
              Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a>
            </footer>
          </div>
        );
      }

      const latest = audits[audits.length - 1];
      const scores = latest.scores || {};
      const delta = latest.delta || {};
      const core30 = latest.core30_coverage || null;
      const contentBriefs = latest.content_briefs || [];

      const chartData = audits.map(a => ({
        date: a.audit_date,
        Overall: a.scores?.overall ?? 0,
        SEO: a.scores?.seo?.score ?? 0,
        AI: a.scores?.ai_discoverability?.score ?? 0,
        GEO: a.scores?.geo_readiness?.score ?? 0,
      }));

      const latestFindings = findings.filter(f => f.audit_id === latest.id);
      const latestGeo = geoSignals.filter(g => g.audit_id === latest.id);
      const quickWins = latestFindings.filter(f => f.effort_minutes <= 15 && f.impact === 'high' && f.status === 'open');
      const latestRankMap = rankMaps.length > 0 ? rankMaps[0] : null;

      const openFindings = latestFindings.filter(f => f.status === 'open').length;
      const dirNeedsAtt = directoryListings.filter(l => l.status !== 'listed').length;
      const pendingLinks = linkChecklist.filter(l => l.status !== 'done').length;
      const missingPages = (core30?.categories_missing||0) + (core30?.services_missing||0);

      const tabs = [
        { id:'overview', label:'Overview' },
        { id:'rankmap', label:'Rank Map', badge: latestRankMap ? latestRankMap.top_3_pct+'%' : null },
        { id:'core30', label:'Core 30', badge: missingPages > 0 ? missingPages : null },
        { id:'findings', label:'Findings', badge: openFindings || null },
        { id:'geo', label:'GEO' },
        { id:'ai', label:'AI' },
        { id:'links', label:'Link Checklist', badge: pendingLinks || null },
        { id:'competitors', label:'Competitors' },
        { id:'directories', label:'Directories', badge: dirNeedsAtt || null },
      ];

      return (
        <div className="container">
          <header style={{marginBottom:'1.5rem'}}>
            <h1 style={{margin:'0 0 0.25rem 0'}}>{site.business_name}</h1>
            <p style={{margin:0, color:'#888'}}>{site.domain} &bull; {site.target_city||site.city}, {site.target_state||site.state} &bull; Last audit: {latest.audit_date}</p>
          </header>

          <nav className="tab-bar">
            {tabs.map(t => (
              <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>
                {t.label}
                {t.badge != null && <span className="badge">{t.badge}</span>}
              </button>
            ))}
          </nav>

          {activeTab === 'overview' && <OverviewTab scores={scores} delta={delta} chartData={chartData} quickWins={quickWins} rankMap={latestRankMap} core30={core30} lastAuditDate={latest.audit_date} locationId={locationId} siteDomain={site.domain} />}
          {activeTab === 'rankmap' && <RankMapTab rankMaps={rankMaps} />}
          {activeTab === 'core30' && <Core30Tab core30={core30} contentBriefs={contentBriefs} />}
          {activeTab === 'findings' && <FindingsTab latestFindings={latestFindings} />}
          {activeTab === 'geo' && <GeoTab latestGeo={latestGeo} />}
          {activeTab === 'ai' && <AITab aiMentions={aiMentions} />}
          {activeTab === 'links' && <LinkChecklistTab links={linkChecklist} />}
          {activeTab === 'competitors' && <CompetitorsTab competitors={competitors} site={site} />}
          {activeTab === 'directories' && <DirectoryTab listings={directoryListings} site={site} />}

          <footer style={{marginTop:'2rem', padding:'1rem 0', borderTop:'1px solid #222', fontSize:'0.8rem', color:'#666'}}>
            Powered by <a href="https://tattoonow.com" target="_blank">TattooNOW</a> &bull; Site Audit System v3.0
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
